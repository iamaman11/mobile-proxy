name: Temporary Phase B Explicit Backend Builder

on:
  push:
    branches:
      - agent/phase-b-explicit-sqlite-backend

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-explicit-sqlite-backend

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Wire explicit state backend
        run: |
          python3 - <<'PY'
          from pathlib import Path

          cli = Path('services/control-plane/src/cli.rs')
          body = cli.read_text()
          body = body.replace('use clap::Parser;', 'use clap::{Parser, ValueEnum};', 1)
          enum = '''
          #[derive(ValueEnum, Clone, Copy, Debug, Default, PartialEq, Eq)]
          #[value(rename_all = "snake_case")]
          pub enum StateBackend {
              #[default]
              Json,
              Sqlite,
          }

          '''
          if 'pub enum StateBackend' not in body:
              body = body.replace('#[derive(Parser, Debug)]', enum + '#[derive(Parser, Debug)]', 1)
          field = '''    #[arg(
                  long,
                  env = "CONTROL_PLANE_STATE_BACKEND",
                  value_enum,
                  default_value = "json"
              )]
              pub state_backend: StateBackend,
          '''
          if 'CONTROL_PLANE_STATE_BACKEND' not in body:
              body = body.replace(
                  '    #[arg(\n        long,\n        env = "CONTROL_PLANE_STATE_PATH",',
                  field + '    #[arg(\n        long,\n        env = "CONTROL_PLANE_STATE_PATH",',
                  1,
              )
          cli.write_text(body)

          main = Path('services/control-plane/src/main.rs')
          body = main.read_text()
          if 'mod state_sqlite_backend;' not in body:
              body = body.replace('mod state;', 'mod state;\nmod state_sqlite_backend;', 1)
          body = body.replace(
              'let app = router(AppState::load(cli.state_path).await?, auth);',
              'let app = router(\n        AppState::load_with_backend(cli.state_path, cli.state_backend).await?,\n        auth,\n    );',
              1,
          )
          main.write_text(body)

          state = Path('services/control-plane/src/state.rs')
          body = state.read_text()
          body = body.replace(
              'use crate::fingerprint_migration::normalize_persisted_fingerprints;',
              'use crate::cli::StateBackend;\nuse crate::fingerprint_migration::normalize_persisted_fingerprints;\nuse crate::state_sqlite_backend;',
              1,
          )
          body = body.replace(
              '    state_path: Arc<PathBuf>,\n}',
              '    state_path: Arc<PathBuf>,\n    state_backend: StateBackend,\n}',
              1,
          )
          body = body.replace(
              'struct StoredState {\n    devices: HashMap<String, DeviceRecord>,\n    commands: CommandState,\n}',
              'pub(crate) struct StoredState {\n    pub(crate) devices: HashMap<String, DeviceRecord>,\n    pub(crate) commands: CommandState,\n}',
              1,
          )

          load_start = body.index('    pub async fn load(state_path: PathBuf) -> Result<Self> {')
          load_end = body.index('\n    #[cfg(test)]', load_start)
          load_impl = '''    pub async fn load(state_path: PathBuf) -> Result<Self> {
                  Self::load_with_backend(state_path, StateBackend::Json).await
              }

              pub async fn load_with_backend(
                  state_path: PathBuf,
                  state_backend: StateBackend,
              ) -> Result<Self> {
                  let stored = match state_backend {
                      StateBackend::Json => load_json_state(&state_path)?,
                      StateBackend::Sqlite => state_sqlite_backend::load_existing(&state_path)?,
                  };
                  Ok(Self {
                      devices: Arc::new(Mutex::new(stored.devices)),
                      commands: Arc::new(Mutex::new(stored.commands)),
                      state_path: Arc::new(state_path),
                      state_backend,
                  })
              }

              fn persist_candidate(
                  &self,
                  expected_devices: &HashMap<String, DeviceRecord>,
                  expected_commands: &CommandState,
                  candidate_devices: &HashMap<String, DeviceRecord>,
                  candidate_commands: &CommandState,
              ) -> Result<()> {
                  let candidate = StoredState {
                      devices: candidate_devices.clone(),
                      commands: candidate_commands.clone(),
                  };
                  match self.state_backend {
                      StateBackend::Json => write_stored_state(self.state_path.as_ref(), &candidate),
                      StateBackend::Sqlite => {
                          let expected = StoredState {
                              devices: expected_devices.clone(),
                              commands: expected_commands.clone(),
                          };
                          let changes = state_sqlite_backend::compare_and_swap(
                              self.state_path.as_ref(),
                              &expected,
                              &candidate,
                          )?;
                          tracing::debug!(
                              devices_upserted = changes.devices_upserted,
                              devices_deleted = changes.devices_deleted,
                              command_results_inserted = changes.command_results_inserted,
                              command_results_deleted = changes.command_results_deleted,
                              idempotency_claims_inserted = changes.idempotency_claims_inserted,
                              idempotency_claims_deleted = changes.idempotency_claims_deleted,
                              pending_commands_inserted = changes.pending_commands_inserted,
                              pending_commands_deleted = changes.pending_commands_deleted,
                              "SQLite control-plane candidate committed"
                          );
                          Ok(())
                      }
                  }
              }
          '''
          body = body[:load_start] + load_impl + body[load_end:]

          old_test_persist = '''    #[cfg(test)]
              async fn persist_for_test(&self) -> Result<()> {
                  let devices = self.devices.lock().await;
                  let commands = self.commands.lock().await;
                  let stored = StoredState {
                      devices: devices.clone(),
                      commands: commands.clone(),
                  };
                  write_stored_state(self.state_path.as_ref(), &stored)
              }
          '''
          new_test_persist = '''    #[cfg(test)]
              async fn persist_for_test(&self) -> Result<()> {
                  let devices = self.devices.lock().await;
                  let commands = self.commands.lock().await;
                  let stored = StoredState {
                      devices: devices.clone(),
                      commands: commands.clone(),
                  };
                  match self.state_backend {
                      StateBackend::Json => write_stored_state(self.state_path.as_ref(), &stored),
                      StateBackend::Sqlite => {
                          state_sqlite_backend::replace_for_test(self.state_path.as_ref(), &stored)
                      }
                  }
              }
          '''
          if old_test_persist not in body:
              raise SystemExit('persist_for_test block not found')
          body = body.replace(old_test_persist, new_test_persist, 1)

          replacements = [
              (
                  '''        let stored = StoredState {
                      devices: devices.clone(),
                      commands: commands_guard.clone(),
                  };
                  write_stored_state(self.state_path.as_ref(), &stored)
                      .map_err(|_| RegisterDeviceError::Persistence)?;
          ''',
                  '''        self.persist_candidate(
                      &devices_guard,
                      &commands_guard,
                      &devices,
                      &commands_guard,
                  )
                  .map_err(|_| RegisterDeviceError::Persistence)?;
          ''',
              ),
              (
                  '''        let stored = StoredState {
                      devices: devices.clone(),
                      commands: commands_guard.clone(),
                  };
                  write_stored_state(self.state_path.as_ref(), &stored)
                      .map_err(|_| HeartbeatError::Persistence)?;
          ''',
                  '''        self.persist_candidate(
                      &devices_guard,
                      &commands_guard,
                      &devices,
                      &commands_guard,
                  )
                  .map_err(|_| HeartbeatError::Persistence)?;
          ''',
              ),
              (
                  '''        let stored = StoredState {
                      devices: devices.clone(),
                      commands: commands_guard.clone(),
                  };
                  write_stored_state(self.state_path.as_ref(), &stored)
                      .map_err(|_| PublicProbeError::Persistence)?;
          ''',
                  '''        self.persist_candidate(
                      &devices_guard,
                      &commands_guard,
                      &devices,
                      &commands_guard,
                  )
                  .map_err(|_| PublicProbeError::Persistence)?;
          ''',
              ),
              (
                  '''        let stored = StoredState {
                      devices: devices.clone(),
                      commands: commands.clone(),
                  };
                  write_stored_state(self.state_path.as_ref(), &stored)
                      .map_err(|_| AcknowledgeCommandError::Persistence)?;
          ''',
                  '''        self.persist_candidate(
                      &devices_guard,
                      &commands_guard,
                      &devices,
                      &commands,
                  )
                  .map_err(|_| AcknowledgeCommandError::Persistence)?;
          ''',
              ),
          ]
          for old, new in replacements:
              if old not in body:
                  raise SystemExit(f'mutation persistence block not found: {old[:80]!r}')
              body = body.replace(old, new, 1)

          issue_anchor = '''        let mut devices = devices_guard.clone();
              let mut commands = commands_guard.clone();

              let migration =
          '''
          issue_replacement = '''        let mut devices = devices_guard.clone();
              let mut commands = commands_guard.clone();
              let expected_devices = devices.clone();
              let expected_commands = commands.clone();

              let migration =
          '''
          if issue_anchor not in body:
              raise SystemExit('issue expected-state anchor not found')
          body = body.replace(issue_anchor, issue_replacement, 1)
          old_issue_persist = 'persist_candidate(self.state_path.as_ref(), &devices, &commands)?;'
          new_issue_persist = '''self.persist_candidate(
                          &expected_devices,
                          &expected_commands,
                          &devices,
                          &commands,
                      )
                      .map_err(|_| IssueCommandError::Persistence)?;'''
          if body.count(old_issue_persist) != 2:
              raise SystemExit(f'expected two issue persist calls, found {body.count(old_issue_persist)}')
          body = body.replace(old_issue_persist, new_issue_persist, 2)

          free_start = body.find('\nfn persist_candidate(\n')
          if free_start != -1:
              free_end = body.index('\nfn write_stored_state(', free_start)
              body = body[:free_start] + body[free_end:]

          helper = '''
          fn load_json_state(state_path: &Path) -> Result<StoredState> {
              match fs::read_to_string(state_path) {
                  Ok(body) => {
                      let (normalized, fingerprint_migration) =
                          normalize_persisted_fingerprints(&body).with_context(|| {
                              format!("failed to migrate {}", state_path.display())
                          })?;
                      let mut stored: StoredState = serde_json::from_value(normalized)
                          .with_context(|| format!("failed to parse {}", state_path.display()))?;
                      let command_migration = normalize_command_state(&mut stored.commands)
                          .map_err(|_| {
                              anyhow!("persisted command idempotency state is inconsistent")
                          })?;
                      if fingerprint_migration.total() > 0 || command_migration.changed() {
                          write_stored_state(state_path, &stored).with_context(|| {
                              format!("failed to persist migrated {}", state_path.display())
                          })?;
                      }
                      if fingerprint_migration.total() > 0 {
                          tracing::warn!(
                              legacy_config_fingerprints = fingerprint_migration.legacy_config_values,
                              legacy_binary_fingerprints = fingerprint_migration.legacy_binary_values,
                              "legacy persisted fingerprints removed for typed heartbeat backfill"
                          );
                      }
                      if command_migration.changed() {
                          tracing::warn!(
                              recovered_idempotency_results = command_migration.recovered_results,
                              canonicalized_idempotency_keys = command_migration.canonicalized_keys,
                              rebuilt_idempotency_order = command_migration.rebuilt_order,
                              evicted_idempotency_entries = command_migration.evicted_entries,
                              "legacy command idempotency state normalized"
                          );
                      }
                      Ok(stored)
                  }
                  Err(error) if error.kind() == std::io::ErrorKind::NotFound => {
                      Ok(StoredState::default())
                  }
                  Err(error) => Err(error)
                      .with_context(|| format!("failed to read {}", state_path.display())),
              }
          }

          '''
          impl_marker = 'impl AppState {'
          body = body.replace(impl_marker, helper + impl_marker, 1)

          test_marker = '#[cfg(test)]\nmod tests {'
          test_index = body.index(test_marker)
          head, tail = body[:test_index], body[test_index:]
          tail = tail.replace(
              'use super::{AppState, CommandState};',
              'use super::{AppState, CommandState, StateBackend};',
              1,
          )
          lines = tail.splitlines(keepends=True)
          patched = []
          for line in lines:
              patched.append(line)
              if line.lstrip().startswith('state_path: Arc::new('):
                  indent = line[: len(line) - len(line.lstrip())]
                  patched.append(f'{indent}state_backend: StateBackend::Json,\n')
          tail = ''.join(patched)
          body = head + tail
          include = '''
          #[cfg(test)]
          #[path = "state_sqlite_backend_tests.rs"]
          mod sqlite_backend_tests;
          '''
          if 'mod sqlite_backend_tests;' not in body:
              body += include
          state.write_text(body)
          PY

          cargo fmt --all
          cargo check --workspace --all-targets
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock services/control-plane
          if ! git diff --cached --quiet; then
            git commit -m "Wire explicit control-plane state backend [skip ci]"
            git push origin HEAD:agent/phase-b-explicit-sqlite-backend
          fi

      - name: Run strict Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace
