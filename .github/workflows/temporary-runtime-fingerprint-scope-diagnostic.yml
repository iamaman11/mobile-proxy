name: Temporary Runtime Fingerprint Scope Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/typed-runtime-fingerprints-builder'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Apply payload to exact target
        run: |
          set -euo pipefail
          expected_base=a6d289b9c8bc93a2bc961d6630dc124f71436746
          test "$(git rev-parse origin/main)" = "$expected_base"
          cp .agent/apply_runtime_fingerprint_slice.py /tmp/apply.py
          cp -R .agent/runtime-fingerprint-payload /tmp/payload
          git fetch origin agent/typed-runtime-fingerprints
          git checkout -B agent/typed-runtime-fingerprints origin/agent/typed-runtime-fingerprints
          test "$(git rev-parse HEAD)" = "$expected_base"
          mkdir -p .agent/runtime-fingerprint-payload
          cp /tmp/apply.py .agent/apply_runtime_fingerprint_slice.py
          cp -R /tmp/payload/. .agent/runtime-fingerprint-payload/
          python3 .agent/apply_runtime_fingerprint_slice.py
          rm -rf .agent
          git status --porcelain=v1 > /tmp/scope-status.txt
          git diff --name-only origin/main > /tmp/scope-diff.txt
          cat > /tmp/scope-expected.txt <<'EOF'
          apps/operator-cli/src/commands.rs
          config/host-daemon.example.env
          contracts/governance/invariant-enforcement.json
          crates/foundation/src/lib.rs
          crates/proxy-core/src/fingerprints.rs
          crates/proxy-core/src/lib.rs
          crates/proxy-core/src/records.rs
          docs/architecture/digest-inventory-and-migration.md
          docs/architecture/invariant-enforcement.md
          docs/architecture/runtime-fingerprint-migration.md
          scripts/check_digest_policy.py
          scripts/tests/test_architecture_boundaries.py
          scripts/tests/test_digest_policy.py
          services/control-plane/src/fingerprint_migration.rs
          services/control-plane/src/main.rs
          services/control-plane/src/projection.rs
          services/control-plane/src/routes.rs
          services/control-plane/src/state.rs
          services/host-daemon/src/api.rs
          services/host-daemon/src/config.rs
          services/host-daemon/src/control_plane.rs
          services/host-daemon/src/fingerprints.rs
          services/host-daemon/src/main.rs
          services/host-daemon/src/rotation.rs
          EOF
          sed -i 's/^          //' /tmp/scope-expected.txt
      - name: Upload exact scope evidence
        uses: actions/upload-artifact@v7
        with:
          name: runtime-fingerprint-scope
          path: |
            /tmp/scope-status.txt
            /tmp/scope-diff.txt
            /tmp/scope-expected.txt
          if-no-files-found: error
          retention-days: 1
