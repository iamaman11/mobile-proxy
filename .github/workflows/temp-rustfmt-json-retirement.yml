name: Temporary Rustfmt JSON Retirement

on:
  pull_request:
    paths:
      - ".github/workflows/temp-rustfmt-json-retirement.yml"

permissions:
  contents: write

jobs:
  format:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/phase-b-retire-json-runtime'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Install rustfmt
        run: rustup toolchain install stable --profile minimal --component rustfmt
      - name: Apply exact formatter
        run: cargo +stable fmt --all
      - name: Remove temporary formatter
        run: git rm .github/workflows/temp-rustfmt-json-retirement.yml
      - name: Publish clean formatting commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Apply rustfmt to JSON runtime retirement"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
