name: Agent Exact Session Binding Builder

on:
  push:
    branches:
      - agent/exact-session-binding-builder

permissions:
  contents: write
  issues: write

concurrency:
  group: agent-exact-session-binding-builder
  cancel-in-progress: true

jobs:
  build:
    name: Validate and publish exact session binding
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out isolated builder inputs
        uses: actions/checkout@v7
        with:
          ref: agent/exact-session-binding-builder

      - name: Record builder trigger
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 51 \
            --repo "$GITHUB_REPOSITORY" \
            --body "Exact-session builder trigger received for builder commit \`${GITHUB_SHA}\`."

      - name: Verify and decode bounded transformation
        id: preparation
        shell: bash
        run: |
          set +e
          log=/tmp/exact-session-binding-preparation.log
          : > "$log"
          {
            cat \
              .agent/exact-session-binding.py.gz.b64.00 \
              .agent/exact-session-binding.py.gz.b64.01 \
              .agent/exact-session-binding.py.gz.b64.02 \
              .agent/exact-session-binding.py.gz.b64.03a \
              .agent/exact-session-binding.py.gz.b64.03b \
              .agent/exact-session-binding.py.gz.b64.03c \
              .agent/exact-session-binding.py.gz.b64.03d0 \
              .agent/exact-session-binding.py.gz.b64.03d1 \
              .agent/exact-session-binding.py.gz.b64.03d2 \
              .agent/exact-session-binding.py.gz.b64.03d3 \
              .agent/exact-session-binding.py.gz.b64.04 \
              | tr -d '\n' > /tmp/exact-session-binding.py.gz.b64
            echo "1d2ab9add1aa51242013119725f3909b6bb20eda4620c5737fecd8557544646c  /tmp/exact-session-binding.py.gz.b64" | sha256sum --check --strict
            base64 --decode /tmp/exact-session-binding.py.gz.b64 > /tmp/exact-session-binding.py.gz
            echo "ce50b4fbc0524894d58f2e3ffbd0d6faa66c299aaceb7f3f9764497f1487edb0  /tmp/exact-session-binding.py.gz" | sha256sum --check --strict
            gzip --decompress --stdout /tmp/exact-session-binding.py.gz > /tmp/exact-session-binding.py
            echo "eab13b291cf5037ba1236942cc8937292505032084b2de227677cc7993780b20  /tmp/exact-session-binding.py" | sha256sum --check --strict
            python3 .agent/repair-exact-session-transform.py /tmp/exact-session-binding.py
            python3 -m py_compile /tmp/exact-session-binding.py
            sha256sum /tmp/exact-session-binding.py
          } >> "$log" 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload preparation diagnostic
        if: steps.preparation.outputs.status != '0'
        uses: actions/upload-artifact@v7
        with:
          name: exact-session-binding-preparation-diagnostic
          path: /tmp/exact-session-binding-preparation.log
          if-no-files-found: error
          retention-days: 2

      - name: Record preparation failure
        if: steps.preparation.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo 'Exact-session builder failed while verifying or decoding its bounded transformation payload:'
            echo
            echo '```text'
            tail -n 100 /tmp/exact-session-binding-preparation.log
            echo '```'
          } > /tmp/exact-session-binding-preparation-failure.md
          gh issue comment 51 --repo "$GITHUB_REPOSITORY" --body-file /tmp/exact-session-binding-preparation-failure.md
          exit 1

      - name: Check out current production baseline
        if: steps.preparation.outputs.status == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags origin main
          git checkout -B agent/phase-c-exact-session-binding origin/main

      - name: Enforce delivery-order gate
        if: steps.preparation.outputs.status == '0'
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f docs/phase-c-pending-stream-lifecycle-audit.md ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=false" >> "$GITHUB_OUTPUT"
          gh issue comment 51 \
            --repo "$GITHUB_REPOSITORY" \
            --body 'Builder is prepared and integrity-checked, but delivery item 9 remains gated because the item 8 audit is not yet present on `main`. No production source was changed.'

      - name: Apply and validate complete bounded slice
        if: steps.preparation.outputs.status == '0' && steps.gate.outputs.ready == 'true'
        id: validation
        shell: bash
        run: |
          set +e
          log=/tmp/exact-session-binding-validation.log
          : > "$log"
          status=0
          stage=none

          run_stage() {
            local candidate_stage="$1"
            shift
            if [ "$status" -ne 0 ]; then
              return
            fi
            stage="$candidate_stage"
            {
              echo
              echo "=== $stage ==="
              "$@"
            } >> "$log" 2>&1
            candidate_status=$?
            if [ "$candidate_status" -ne 0 ]; then
              status="$candidate_status"
            fi
          }

          run_stage transformation python3 /tmp/exact-session-binding.py
          run_stage diff-check git diff --check
          run_stage architecture python3 scripts/check_architecture_boundaries.py
          run_stage python-regressions python3 -m unittest discover -s scripts/tests -p 'test_*.py'
          run_stage rust-toolchain rustup toolchain install stable --profile minimal --component rustfmt,clippy
          run_stage rust-default rustup default stable
          run_stage rustfmt cargo fmt --all
          run_stage rustfmt-check cargo fmt --all -- --check
          run_stage clippy cargo clippy --quiet --workspace --all-targets --message-format=short -- -D warnings
          run_stage workspace-tests cargo test --quiet --workspace

          if [ "$status" -eq 0 ]; then
            stage=scope-check
            actual="$(git status --short | awk '{print $2}' | sort)"
            expected="$(printf '%s\n' \
              crates/reverse-tunnel/src/state.rs \
              crates/reverse-tunnel/src/tunnel.rs \
              docs/phase-c-exact-session-binding.md | sort)"
            {
              echo
              echo "=== scope-check ==="
              printf 'actual:\n%s\nexpected:\n%s\n' "$actual" "$expected"
            } >> "$log"
            if [ "$actual" != "$expected" ]; then
              status=1
            fi
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "stage=$stage" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation diagnostic
        if: steps.preparation.outputs.status == '0' && steps.gate.outputs.ready == 'true' && steps.validation.outputs.status != '0'
        uses: actions/upload-artifact@v7
        with:
          name: exact-session-binding-validation-diagnostic
          path: /tmp/exact-session-binding-validation.log
          if-no-files-found: error
          retention-days: 2

      - name: Record validation failure
        if: steps.preparation.outputs.status == '0' && steps.gate.outputs.ready == 'true' && steps.validation.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "Exact-session binding validation failed during \`${{ steps.validation.outputs.stage }}\`. The bounded diagnostic tail is:"
            echo
            echo '```text'
            tail -n 180 /tmp/exact-session-binding-validation.log
            echo '```'
          } > /tmp/exact-session-binding-failure.md
          gh issue comment 51 --repo "$GITHUB_REPOSITORY" --body-file /tmp/exact-session-binding-failure.md
          exit 1

      - name: Commit and publish clean production branch
        if: steps.preparation.outputs.status == '0' && steps.gate.outputs.ready == 'true' && steps.validation.outputs.status == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            crates/reverse-tunnel/src/state.rs \
            crates/reverse-tunnel/src/tunnel.rs \
            docs/phase-c-exact-session-binding.md
          git commit -m "Bind routing authority to exact device sessions"
          git push --force-with-lease origin HEAD:agent/phase-c-exact-session-binding
          source_sha="$(git rev-parse HEAD)"
          gh issue comment 51 \
            --repo "$GITHUB_REPOSITORY" \
            --body "Exact-session binding source published at \`${source_sha}\`. Architecture enforcement, Python regressions, rustfmt, strict Clippy and the complete workspace test suite passed on that immutable SHA."
