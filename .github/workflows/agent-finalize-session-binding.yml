name: Finalize TCP Session Binding Slice

on:
  push:
    branches:
      - agent/tcp-session-bound-pending-streams

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Apply focused production patch
        run: |
          python3 <<'PY'
          from pathlib import Path
          import subprocess

          legacy = subprocess.check_output(
              [
                  "git",
                  "show",
                  "361d5bcc8e3e7d3704744e4151c5f3b0676c5b51:.github/workflows/agent-tcp-session-binding.yml",
              ],
              text=True,
          )
          prefix = "          state = r'''"
          suffix = "\n          '''\n          # The raw string is indented for YAML readability"
          start = legacy.index(prefix) + len(prefix)
          end = legacy.index(suffix, start)
          state = legacy[start:end]
          state = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in state.splitlines()
          ) + "\n"

          old_specific_control = """            let control = controls.get(expected_node_id).filter(|control| {
                control.session_id == session.session_id && !control.sender.is_closed()
            })?;"""
          new_specific_control = """            let control = controls.get(expected_node_id).filter(|control| {
                control.session_id == session.session_id
            })?;"""
          if state.count(old_specific_control) != 1:
              raise SystemExit("failed to locate exact-node TCP control selection")
          state = state.replace(old_specific_control, new_specific_control, 1)
          Path("crates/reverse-tunnel/src/state.rs").write_text(state)

          tunnel_path = Path("crates/reverse-tunnel/src/tunnel.rs")
          tunnel = tunnel_path.read_text()

          def replace_once(old: str, new: str, label: str) -> None:
              global tunnel
              count = tunnel.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              tunnel = tunnel.replace(old, new, 1)

          run_server_start = tunnel.index("pub async fn run_server(")
          run_server_end = tunnel.index("pub async fn run_quic_server(", run_server_start)
          run_server = tunnel[run_server_start:run_server_end]
          shutdown_old = "            _ = shutdown.changed() => return Ok(()),"
          shutdown_new = """            _ = shutdown.changed() => {
                state.shutdown_tcp().await;
                return Ok(());
            },"""
          if run_server.count(shutdown_old) != 1:
              raise SystemExit("run_server shutdown branch was not unique")
          run_server = run_server.replace(shutdown_old, shutdown_new, 1)
          tunnel = tunnel[:run_server_start] + run_server + tunnel[run_server_end:]

          replace_once(
              """    if matches!(config.transport, TunnelTransport::Hybrid { .. }) {
        if connect_and_pump_quic(config, session_id, shutdown, snapshot, status)
            .await
            .is_ok()
        {
            return Ok(());
        }
        return connect_and_pump_tls_tcp(config, session_id, shutdown, snapshot, status).await;
    }""",
              """    if matches!(config.transport, TunnelTransport::Hybrid { .. }) {
        match connect_and_pump_quic(config, session_id, shutdown, snapshot, status).await {
            Ok(()) => return Ok(()),
            Err(error) => {
                warn!(
                    node_id = %config.node_id,
                    from_transport = "quic",
                    to_transport = "tls_tcp",
                    reason = quic_failover_reason(&error),
                    "reverse tunnel transport failover"
                );
            }
        }
        return connect_and_pump_tls_tcp(config, session_id, shutdown, snapshot, status).await;
    }""",
              "hybrid failover branch",
          )

          replace_once(
              """    if let ClientFrame::ProxyStream {
        session_id,
        stream_id,
        auth_token,
        ..
    } = first
    {
        if !bool::from(auth_token.as_bytes().ct_eq(config.auth_token.as_bytes())) {
            bail!("reverse tunnel proxy stream authentication failed");
        }
        let session_valid = state
            .sessions
            .lock()
            .await
            .values()
            .any(|session| session.connected && session.session_id == session_id);
        if !session_valid {
            bail!("reverse tunnel proxy stream session is not active");
        }
        let sender = state
            .pending_tcp
            .lock()
            .await
            .remove(&stream_id)
            .context("unexpected reverse tunnel proxy stream id")?;
        sender
            .send(stream)
            .map_err(|_| anyhow::anyhow!("proxy requester closed"))?;
        return Ok(());
    }""",
              """    if let ClientFrame::ProxyStream {
        node_id,
        session_id,
        stream_id,
        auth_token,
    } = first
    {
        if !bool::from(auth_token.as_bytes().ct_eq(config.auth_token.as_bytes())) {
            bail!("reverse tunnel proxy stream authentication failed");
        }
        state
            .accept_tcp_proxy_stream(&node_id, session_id, stream_id, stream)
            .await?;
        return Ok(());
    }""",
              "proxy stream acceptance",
          )

          replace_once(
              """    let (reader, mut writer) = stream.into_split();
    let mut reader = BufReader::new(reader);
    let (control_tx, mut control_rx) = mpsc::channel(256);
    state
        .tcp_controls
        .lock()
        .await
        .insert(hello.node_id.clone(), control_tx);
    info!(node_id = %hello.node_id, session_id = %hello.session_id, "TCP reverse tunnel authenticated");
    mark_connected(&state, &hello, None).await;

    loop {
        tokio::select! {
        frame = control_rx.recv() => {
            let Some(frame) = frame else { break; };
            write_server_frame(&mut writer, &frame).await?;
        }
        incoming = read_optional_frame(&mut reader) => match incoming {
            Ok(Some(ClientFrame::Heartbeat(heartbeat))) => {
                mark_heartbeat(&state, &heartbeat).await;
            }
            Ok(Some(ClientFrame::Hello(_) | ClientFrame::ProxyStream { .. })) => {
                bail!("unexpected repeated hello on reverse tunnel session");
            }
            Ok(None) => {
                mark_disconnected(&state, &hello).await;
                return Ok(());
            }
            Err(err) => {
                mark_disconnected(&state, &hello).await;
                return Err(err);
            }
        }
        }
    }
    state.tcp_controls.lock().await.remove(&hello.node_id);
    mark_disconnected(&state, &hello).await;
    Ok(())""",
              """    let (reader, mut writer) = stream.into_split();
    let mut reader = BufReader::new(reader);
    let (control_tx, mut control_rx) = mpsc::channel(256);
    info!(node_id = %hello.node_id, session_id = %hello.session_id, "TCP reverse tunnel authenticated");
    mark_connected(&state, &hello, None).await;
    state
        .register_tcp_control(hello.node_id.clone(), hello.session_id, control_tx)
        .await;

    let result = loop {
        tokio::select! {
        frame = control_rx.recv() => {
            let Some(frame) = frame else { break Ok(()); };
            if let Err(error) = write_server_frame(&mut writer, &frame).await {
                break Err(error);
            }
        }
        incoming = read_optional_frame(&mut reader) => match incoming {
            Ok(Some(ClientFrame::Heartbeat(heartbeat))) => {
                mark_heartbeat(&state, &heartbeat).await;
            }
            Ok(Some(ClientFrame::Hello(_) | ClientFrame::ProxyStream { .. })) => {
                break Err(anyhow::anyhow!("unexpected repeated hello on reverse tunnel session"));
            }
            Ok(None) => break Ok(()),
            Err(error) => break Err(error),
        }
        }
    };
    state
        .remove_tcp_control_for_session(&hello.node_id, hello.session_id)
        .await;
    mark_disconnected(&state, &hello).await;
    result""",
              "TCP control lifecycle",
          )

          replace_once(
              """async fn mark_connected(
    state: &ReverseTunnelServerState,
    hello: &TunnelHello,
    connection: Option<quinn::Connection>,
) {
    let mut sessions = state.sessions.lock().await;
    let accepted_connections = sessions
        .get(&hello.node_id)
        .map(|existing| existing.accepted_connections + 1)
        .unwrap_or(1);
    sessions.insert(
        hello.node_id.clone(),
        ServerSessionSnapshot {
            node_id: hello.node_id.clone(),
            session_id: hello.session_id,
            connected: true,
            accepted_connections,
            last_heartbeat_sequence: None,
        },
    );
    drop(sessions);
    if let Some(connection) = connection {
        state
            .connections
            .lock()
            .await
            .insert(hello.node_id.clone(), connection);
    }
}""",
              """async fn mark_connected(
    state: &ReverseTunnelServerState,
    hello: &TunnelHello,
    connection: Option<quinn::Connection>,
) {
    let mut sessions = state.sessions.lock().await;
    let previous_session = sessions.get(&hello.node_id).map(|session| session.session_id);
    let accepted_connections = sessions
        .get(&hello.node_id)
        .map(|existing| existing.accepted_connections + 1)
        .unwrap_or(1);
    sessions.insert(
        hello.node_id.clone(),
        ServerSessionSnapshot {
            node_id: hello.node_id.clone(),
            session_id: hello.session_id,
            connected: true,
            accepted_connections,
            last_heartbeat_sequence: None,
        },
    );
    drop(sessions);
    if let Some(previous_session) = previous_session {
        state.cancel_pending_for_session(&hello.node_id, previous_session);
        state
            .remove_tcp_control_for_session(&hello.node_id, previous_session)
            .await;
    }
    if let Some(connection) = connection {
        state
            .connections
            .lock()
            .await
            .insert(hello.node_id.clone(), connection);
    }
}""",
              "session replacement cleanup",
          )

          replace_once(
              """async fn mark_disconnected(state: &ReverseTunnelServerState, hello: &TunnelHello) {
    let mut sessions = state.sessions.lock().await;
    let mut remove_connection = false;
    if let Some(session) = sessions.get_mut(&hello.node_id)
        && session.session_id == hello.session_id
    {
        session.connected = false;
        remove_connection = true;
    }
    drop(sessions);
    if remove_connection {
        state.connections.lock().await.remove(&hello.node_id);
    }
}""",
              """async fn mark_disconnected(state: &ReverseTunnelServerState, hello: &TunnelHello) {
    let mut sessions = state.sessions.lock().await;
    let mut remove_session_resources = false;
    if let Some(session) = sessions.get_mut(&hello.node_id)
        && session.session_id == hello.session_id
    {
        session.connected = false;
        remove_session_resources = true;
    }
    drop(sessions);
    if remove_session_resources {
        state.connections.lock().await.remove(&hello.node_id);
        state
            .remove_tcp_control_for_session(&hello.node_id, hello.session_id)
            .await;
        state.cancel_pending_for_session(&hello.node_id, hello.session_id);
    }
}""",
              "disconnect cleanup",
          )

          marker = "async fn connect_and_pump_tls_tcp("
          helper = """fn quic_failover_reason(error: &anyhow::Error) -> &'static str {
    let message = error.to_string();
    if message.contains("timed out") {
        "connect_timeout"
    } else if message.contains("connect failed") {
        "connect_failed"
    } else if message.contains("authentication") {
        "authentication_failed"
    } else if message.contains("closed") {
        "session_closed"
    } else {
        "session_error"
    }
}

"""
          if tunnel.count(marker) != 1:
              raise SystemExit("TLS/TCP function marker was not unique")
          tunnel = tunnel.replace(marker, helper + marker, 1)
          tunnel_path.write_text(tunnel)

          Path(".github/workflows/agent-finalize-session-binding.yml").unlink()
          PY

      - name: Format
        run: cargo fmt --all

      - name: Strict Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Workspace tests
        run: cargo test --workspace

      - name: Commit validated slice
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "bind TCP proxy streams to device sessions"
          git push origin HEAD:agent/tcp-session-bound-pending-streams
