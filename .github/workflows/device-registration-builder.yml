name: Device Registration Builder

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: device-registration-builder-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.head_ref == 'agent/device-registration-application-port' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/device-registration-application-port

      - name: Apply production slice
        run: |
          python3 .agent/build.py
          sed -i 's/use super::{MAX_REGISTERED_DEVICES, RegisterDeviceOutcome};/use super::RegisterDeviceOutcome;/' crates/application/src/device_registration.rs
          sed -i '/assert!(MAX_REGISTERED_DEVICES > 0);/d' crates/application/src/device_registration.rs

      - name: Enforce architecture boundaries
        run: |
          python3 scripts/check_architecture_boundaries.py
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Format and validate
        id: validate
        continue-on-error: true
        run: |
          set -o pipefail
          {
            cargo fmt --all
            cargo clippy --workspace --all-targets -- -D warnings
            cargo test --workspace
            git diff --check
          } 2>&1 | tee device-registration-builder.log

      - name: Upload validation diagnosis
        if: steps.validate.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: device-registration-builder-diagnosis
          path: device-registration-builder.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce validation result
        if: steps.validate.outcome == 'failure'
        run: exit 1

      - name: Publish clean production head
        if: steps.validate.outcome == 'success'
        run: |
          rm -rf .agent
          rm .github/workflows/device-registration-builder.yml
          rm -f device-registration-builder.log
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Extract device registration application port"
          git push origin HEAD:agent/device-registration-application-port
