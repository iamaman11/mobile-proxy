name: Agent Internal Digest Audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    if: github.event.pull_request.head.ref == 'agent/internal-digest-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact audit source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0
      - name: Build internal digest inventory
        run: python3 .agent/audit_internal_digests.py > internal-digest-inventory.txt
      - name: Build exact source snapshot
        run: git archive --format=tar.gz --output=source-snapshot.tar.gz HEAD
      - name: Upload immutable inventory
        uses: actions/upload-artifact@v4
        with:
          name: internal-digest-inventory
          path: internal-digest-inventory.txt
          if-no-files-found: error
          retention-days: 1
      - name: Upload exact source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: source-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 1
