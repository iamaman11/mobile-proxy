name: Agent Internal Digest Audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    if: github.event.pull_request.head.ref == 'agent/internal-digest-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact audit source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Print internal digest inventory
        run: python3 .agent/audit_internal_digests.py
