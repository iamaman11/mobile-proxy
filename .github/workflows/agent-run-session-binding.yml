name: Run Corrected Session Binding Slice

on:
  push:
    branches:
      - agent/tcp-session-bound-pending-streams

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Execute corrected focused patch
        run: |
          python3 <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/agent-tcp-session-binding.yml').read_text()
          raw = workflow.split("          python3 <<'PY'\n", 1)[1].split("\n          PY", 1)[0]
          script = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in raw.splitlines()
          )

          bad = '''replace_once(
          ''' + "'''            _ = shutdown.changed() => return Ok(()),''',\n" + "'''            _ = shutdown.changed() => {\n                              state.shutdown_tcp().await;\n                              return Ok(());\n                          },''')"
          good = '''shutdown_branch = "            _ = shutdown.changed() => return Ok(()),"
          shutdown_replacement = """            _ = shutdown.changed() => {
                              state.shutdown_tcp().await;
                              return Ok(());
                          },"""
          shutdown_index = tunnel.find(shutdown_branch)
          if shutdown_index < 0:
              raise SystemExit('failed to locate run_server shutdown branch')
          tunnel = (
              tunnel[:shutdown_index]
              + shutdown_replacement
              + tunnel[shutdown_index + len(shutdown_branch):]
          )'''
          if bad not in script:
              raise SystemExit('failed to locate shutdown replacement in embedded patch')
          script = script.replace(bad, good, 1)
          script = script.replace(
              "Path('.github/workflows/agent-tcp-session-binding.yml').unlink()",
              "Path('.github/workflows/agent-tcp-session-binding.yml').unlink(); Path('.github/workflows/agent-run-session-binding.yml').unlink(); Path('.agent-trigger').unlink(missing_ok=True)",
              1,
          )
          exec(compile(script, '<session-binding-patch>', 'exec'), {'__name__': '__main__'})
          PY

      - name: Format
        run: cargo fmt --all

      - name: Strict Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Workspace tests
        run: cargo test --workspace

      - name: Commit validated slice
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A .agent-trigger .github/workflows/agent-tcp-session-binding.yml .github/workflows/agent-run-session-binding.yml crates/reverse-tunnel/src/state.rs crates/reverse-tunnel/src/tunnel.rs
          git commit -m "bind TCP proxy streams to device sessions"
          git push origin HEAD:agent/tcp-session-bound-pending-streams
