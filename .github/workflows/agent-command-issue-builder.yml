name: Agent Command Issue Builder

on:
  push:
    branches:
      - agent/command-issue-application-port-builder
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: agent-command-issue-builder-safety-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate command rollback and capacity safety
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Fetch isolated patch inputs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --no-tags --depth=1 origin agent/command-issue-application-port-builder
          git checkout -q FETCH_HEAD
          cp .agent/apply_command_safety_followup.py /tmp/apply_command_safety_followup.py
          cp .agent/apply_command_safety_fixup.py /tmp/apply_command_safety_fixup.py
          cp .agent/apply_command_safety_compile_fix.py /tmp/apply_command_safety_compile_fix.py

      - name: Check out exact production head
        run: |
          git fetch -q --no-tags origin agent/command-issue-application-port
          git checkout -q -B agent/command-issue-application-port origin/agent/command-issue-application-port
          test "$(git rev-parse HEAD)" = "0e4abd65f26975f6809211875e87b06137fc2117"

      - name: Apply bounded safety follow-up
        run: |
          python3 /tmp/apply_command_safety_followup.py
          python3 /tmp/apply_command_safety_fixup.py
          python3 /tmp/apply_command_safety_compile_fix.py

      - name: Validate governance and Python regressions
        run: |
          git diff --check
          python3 scripts/check_architecture_boundaries.py
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Format Rust workspace
        run: |
          cargo fmt --all
          cargo fmt --all -- --check

      - name: Run strict Clippy
        run: |
          if ! cargo clippy --quiet --workspace --all-targets --message-format=short -- -D warnings > /tmp/clippy.log 2>&1; then
            grep -E 'error(\[|:)|warning:' /tmp/clippy.log | tail -n 100 || true
            tail -n 40 /tmp/clippy.log
            exit 1
          fi

      - name: Run workspace tests
        run: |
          if ! cargo test --quiet --workspace > /tmp/tests.log 2>&1; then
            tail -n 120 /tmp/tests.log
            exit 1
          fi

      - name: Verify clean production diff
        run: |
          git diff --check
          test ! -e .agent
          test ! -e .github/workflows/agent-command-issue-builder.yml
          git status --short

      - name: Commit exact safety follow-up
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            crates/application/src/command_issue.rs \
            crates/application/src/lib.rs \
            services/control-plane/src/state.rs \
            services/control-plane/src/routes.rs \
            docs/architecture/command-issuance-application-port.md
          test -z "$(git status --short | grep '^??' || true)"
          git commit -m "Preserve command claims across rollback"

      - name: Push clean production branch
        run: git push origin HEAD:agent/command-issue-application-port
