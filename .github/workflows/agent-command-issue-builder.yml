name: Agent Command Issue Builder

on:
  push:
    branches:
      - agent/command-issue-application-port-builder
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: agent-command-issue-builder-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build clean command issuance slice
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Fetch builder inputs quietly
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --no-tags --depth=1 origin agent/command-issue-application-port-builder
          git checkout -q FETCH_HEAD
          cp .agent/apply_command_issue_followup.py /tmp/apply_command_issue_followup.py

      - name: Check out exact production branch
        run: |
          git fetch -q --no-tags origin agent/command-issue-application-port
          git checkout -q -B agent/command-issue-application-port origin/agent/command-issue-application-port

      - name: Apply bounded follow-up
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("/tmp/apply_command_issue_followup.py")
          body = path.read_text(encoding="utf-8").replace("ROOT = Path(__file__).resolve().parents[1]", "ROOT = Path.cwd()")
          original = "    count = body.count(old)\n    if count != 1:\n        raise SystemExit(f\"{relative}: expected one anchor, found {count}\")\n    path.write_text(body.replace(old, new), encoding=\"utf-8\")\n"
          replacement = "    count = body.count(old)\n    first_only = relative == \"services/control-plane/src/routes.rs\" and old.startswith(\"use uuid::Uuid;\")\n    expected = 2 if first_only else 1\n    if count != expected:\n        raise SystemExit(f\"{relative}: expected {expected} anchors, found {count}\")\n    path.write_text(body.replace(old, new, 1 if first_only else -1), encoding=\"utf-8\")\n"
          if original not in body:
              raise SystemExit("builder helper anchor missing")
          body = body.replace(original, replacement)
          body = body.replace("    evidence=[", "    enforcement=[")
          body = body.replace("    ci_controls=[", "    ci=[")
          exec(compile(body, str(path), "exec"), {"__name__": "__main__"})
          PY

      - name: Write exact architecture regression fixture
        run: |
          cat > scripts/tests/test_architecture_boundaries.py <<'PY'
          import importlib.util
          from pathlib import Path
          import tempfile
          import unittest
          from unittest.mock import patch

          SCRIPT = Path(__file__).resolve().parents[1] / "check_architecture_boundaries.py"
          SPEC = importlib.util.spec_from_file_location("architecture_boundaries", SCRIPT)
          assert SPEC is not None and SPEC.loader is not None
          MODULE = importlib.util.module_from_spec(SPEC)
          SPEC.loader.exec_module(MODULE)


          class ArchitectureBoundaryTests(unittest.TestCase):
              def create_repository(
                  self,
                  *,
                  runtime_manifest: str = """[package]
          name = "runtime-domain"
          version = "0.1.0"

          [dependencies]
          serde = "1"
          """,
                  runtime_source: str = "pub enum RuntimeState { WaitingTunnel }\n",
                  foundation_manifest: str = """[package]
          name = "mobile-proxy-foundation"
          version = "0.1.0"

          [dependencies]
          blake3 = "1"
          serde = "1"
          uuid = "1"
          """,
                  foundation_source: str = "pub struct RequestId;\n",
                  application_manifest: str = """[package]
          name = "mobile-proxy-application"
          version = "0.1.0"

          [dependencies]
          mobile-proxy-foundation = "1"
          proxy-core = "1"
          """,
                  application_source: str = "use proxy_core::DeviceCommand;\npub trait UseCase {}\n",
              ) -> Path:
                  temporary = tempfile.TemporaryDirectory()
                  self.addCleanup(temporary.cleanup)
                  root = Path(temporary.name)
                  for relative, manifest, source in [
                      ("crates/runtime-domain", runtime_manifest, runtime_source),
                      ("crates/foundation", foundation_manifest, foundation_source),
                      ("crates/application", application_manifest, application_source),
                  ]:
                      crate = root / relative
                      (crate / "src").mkdir(parents=True)
                      (crate / "Cargo.toml").write_text(manifest, encoding="utf-8")
                      (crate / "src/lib.rs").write_text(source, encoding="utf-8")
                  return root

              def check_fixture(self, root: Path):
                  with (
                      patch.object(MODULE, "check_digest_policy", return_value=[]),
                      patch.object(MODULE, "check_invariant_enforcement", return_value=[]),
                  ):
                      return MODULE.check_repository(root)

              def test_accepts_declared_pure_crates(self):
                  self.assertEqual(self.check_fixture(self.create_repository()), [])

              def test_rejects_infrastructure_dependency_in_foundation(self):
                  root = self.create_repository(
                      foundation_manifest="""[package]
          name = "mobile-proxy-foundation"
          version = "0.1.0"

          [dependencies]
          serde = "1"
          tokio = "1"
          """
                  )
                  errors = self.check_fixture(root)
                  self.assertTrue(any("forbidden dependency 'tokio'" in error for error in errors))

              def test_rejects_adapter_specific_domain_vocabulary(self):
                  root = self.create_repository(
                      runtime_source='pub const OWNER: &str = "wireguard";\n'
                  )
                  errors = self.check_fixture(root)
                  self.assertTrue(any("forbidden pure-crate token 'wireguard'" in error for error in errors))

              def test_rejects_identity_generation_inside_foundation(self):
                  root = self.create_repository(
                      foundation_source="pub fn generate() { let _ = Uuid::new_v4(); }\n"
                  )
                  errors = self.check_fixture(root)
                  self.assertTrue(any("forbidden pure-crate token 'new_v4'" in error for error in errors))

              def test_allows_domain_dependency_but_rejects_transport_in_application(self):
                  accepted = self.create_repository()
                  self.assertEqual(self.check_fixture(accepted), [])
                  rejected = self.create_repository(
                      application_manifest="""[package]
          name = "mobile-proxy-application"
          version = "0.1.0"

          [dependencies]
          proxy-core = "1"
          axum = "1"
          """
                  )
                  errors = self.check_fixture(rejected)
                  self.assertTrue(any("forbidden dependency 'axum'" in error for error in errors))


          if __name__ == "__main__":
              unittest.main()
          PY

      - name: Validate governance and Python regressions
        run: |
          python3 scripts/check_architecture_boundaries.py
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Format and validate Rust workspace
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Publish clean production branch
        run: |
          git diff --check
          test ! -e .agent
          test ! -e .github/workflows/agent-command-issue-builder.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Cargo.toml Cargo.lock \
            crates/application \
            services/control-plane/Cargo.toml \
            services/control-plane/src/routes.rs \
            services/control-plane/src/state.rs \
            scripts/check_architecture_boundaries.py \
            scripts/tests/test_architecture_boundaries.py \
            contracts/governance/invariant-enforcement.json \
            docs/architecture/invariant-enforcement.md \
            docs/architecture/command-issuance-application-port.md
          test -z "$(git status --short | grep '^??' || true)"
          git commit -m "Extract command issuance application port"
          git push origin HEAD:agent/command-issue-application-port
