name: Temporary Phase B Migration Utility Builder

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/phase-b-migration-cli-export

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Capture strict Clippy diagnostics
        id: clippy
        continue-on-error: true
        run: cargo clippy --workspace --all-targets -- -D warnings 2>&1 | tee clippy.log

      - name: Upload Clippy diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phase-b-migration-cli-clippy
          path: clippy.log
          if-no-files-found: error
          retention-days: 2

      - name: Enforce strict Clippy
        if: steps.clippy.outcome == 'failure'
        run: exit 1

      - name: Run workspace tests
        run: cargo test --workspace
