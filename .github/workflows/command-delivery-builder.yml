name: Command Delivery Builder

on:
  push:
    branches:
      - agent/command-delivery-application-ports

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Apply production slice
        run: |
          set -euo pipefail
          for patch in .agent/*.patch; do
            git apply --recount --check "$patch"
            git apply --recount "$patch"
          done

      - name: Enforce architecture boundaries
        run: |
          python3 scripts/check_architecture_boundaries.py
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Format and validate
        run: |
          cargo fmt --all
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
          git diff --check

      - name: Publish clean branch
        run: |
          rm -rf .agent
          rm .github/workflows/command-delivery-builder.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Extract command delivery application ports"
          git push origin HEAD:agent/command-delivery-application-ports
