name: Command Delivery Builder

on:
  push:
    branches:
      - agent/command-delivery-application-ports

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/command-delivery-application-ports

      - name: Finalize production slice
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              body = target.read_text(encoding="utf-8")
              count = body.count(old)
              if count != 1:
                  raise SystemExit(
                      f"{path}: expected exactly one replacement anchor, found {count}: {old!r}"
                  )
              target.write_text(body.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "services/control-plane/src/state.rs",
              'state_path: Arc::new(PathBuf::from("unused")),',
              'state_path: Arc::new(std::path::PathBuf::from("unused")),',
          )

          replace_once(
              "contracts/governance/invariant-enforcement.json",
              '  "baseline_main_sha": "3f6a2bb98807d289b5e436911b9dd92c102543d4",',
              '  "baseline_main_sha": "960745007e543c9245a69e57a4856b4f39ab3730",',
          )
          replace_once(
              "contracts/governance/invariant-enforcement.json",
              '''      "ARCH-004",
              "U",
              "§2.2",
              "Other contexts mutate aggregate state only through typed application ports",
              "partially_enforced",
              "application",
              [
                "crates/application/src/command_issue.rs",
                "services/control-plane/src/state.rs"
              ],
              [
                "RQ-A",
                "RQ-T"
              ],
              "remaining-control-plane-application-ports",
              "",
              "Command issuance mutates through a typed application port; registration, heartbeat, probe and acknowledgement are still direct handlers.",
              ""
          ''',
              '''      "ARCH-004",
              "U",
              "§2.2",
              "Other contexts mutate aggregate state only through typed application ports",
              "partially_enforced",
              "application",
              [
                "crates/application/src/command_issue.rs",
                "crates/application/src/command_delivery.rs",
                "services/control-plane/src/state.rs"
              ],
              [
                "RQ-A",
                "RQ-T"
              ],
              "remaining-control-plane-application-ports",
              "",
              "Command issuance and successful acknowledgement mutate through typed application ports; registration, heartbeat and probe are still direct handlers.",
              ""
          ''',
          )
          replace_once(
              "contracts/governance/invariant-enforcement.json",
              '''      "ARCH-005",
              "A1",
              "Decision 8",
              "Transport handlers only authenticate, authorize, validate, call one use case and map a typed result",
              "partially_enforced",
              "application",
              [
                "crates/application/src/command_issue.rs",
                "services/control-plane/src/routes.rs"
              ],
              [
                "RQ-A",
                "RQ-T"
              ],
              "remaining-control-plane-application-ports",
              "",
              "issue_command authenticates at the router, accepts typed input, calls one use case and maps typed outcomes; other handlers remain transitional.",
              ""
          ''',
              '''      "ARCH-005",
              "A1",
              "Decision 8",
              "Transport handlers only authenticate, authorize, validate, call one use case and map a typed result",
              "partially_enforced",
              "application",
              [
                "crates/application/src/command_issue.rs",
                "crates/application/src/command_delivery.rs",
                "services/control-plane/src/routes.rs"
              ],
              [
                "RQ-A",
                "RQ-T"
              ],
              "remaining-control-plane-application-ports",
              "",
              "Command issue, poll and acknowledgement handlers authenticate at the router, call one typed use case and map typed outcomes; registration, heartbeat and probe remain transitional.",
              ""
          ''',
          )
          replace_once(
              "contracts/governance/invariant-enforcement.json",
              '''      "PERSIST-003",
              "U",
              "§7",
              "Business state, idempotency result, domain events, audit and outbox commit atomically",
              "partially_enforced",
              "persistence",
              [
                "crates/application/src/command_issue.rs",
                "services/control-plane/src/state.rs"
              ],
              [
                "RQ-T"
              ],
              "atomic-command-audit-outbox",
              "",
              "Command queue, durable idempotency result and device projection are written as one fsynced candidate before in-memory publication; domain event, audit and outbox persistence are absent.",
              ""
          ''',
              '''      "PERSIST-003",
              "U",
              "§7",
              "Business state, idempotency result, domain events, audit and outbox commit atomically",
              "partially_enforced",
              "persistence",
              [
                "crates/application/src/command_issue.rs",
                "crates/application/src/command_delivery.rs",
                "services/control-plane/src/state.rs"
              ],
              [
                "RQ-T"
              ],
              "atomic-command-audit-outbox",
              "",
              "Command issuance and successful acknowledgement write queue, durable idempotency result and device projection as one fsynced candidate before in-memory publication; domain event, audit and outbox persistence are absent.",
              ""
          ''',
          )

          replace_once(
              "docs/architecture/invariant-enforcement.md",
              "Baseline `main`: `3f6a2bb98807d289b5e436911b9dd92c102543d4`",
              "Baseline `main`: `960745007e543c9245a69e57a4856b4f39ab3730`",
          )
          replace_once(
              "docs/architecture/invariant-enforcement.md",
              "- thin transport handlers beyond the extracted command-issuance route and prohibition of SQL or business transitions in all HTTP routes;\n- durable SQLite canonical state, transactional audit/outbox semantics and JSON migration;",
              "- thin transport handlers beyond the extracted command lifecycle routes and prohibition of SQL or business transitions in all HTTP routes;\n- durable SQLite canonical state, durable acknowledgement history, transactional audit/outbox semantics and JSON migration;",
          )
          replace_once(
              "docs/architecture/invariant-enforcement.md",
              "## Command issuance application-port enforcement\n\nThe existing admin `issue_command` capability now has one bounded clean-dependency slice:",
              "## Command lifecycle application-port enforcement\n\nThe existing command issue, poll and acknowledgement capabilities now have bounded clean-dependency slices:",
          )
          replace_once(
              "docs/architecture/invariant-enforcement.md",
              '''- a failed write returns `state_persistence_failed` and leaves the in-memory state unchanged.

          This evidence applies only to command issuance. Registration, heartbeat, public probe, command polling and acknowledgement remain transitional and keep `ARCH-004` and `ARCH-005` at `partially_enforced`.''',
              '''- a failed write returns `state_persistence_failed` and leaves the in-memory state unchanged.
          - command polling validates queue ownership and returns a typed pending-or-empty outcome without transport logic reaching into the queue;
          - successful acknowledgement removes the command and updates the device projection in one fsynced candidate before publishing either in memory;
          - negative acknowledgement preserves the pending command and the existing `{ "accepted": true }` compatibility shape.

          Registration, heartbeat and public probe remain transitional and keep `ARCH-004` and `ARCH-005` at `partially_enforced`.''',
          )

          Path("docs/architecture/command-delivery-application-port.md").write_text(
              '''# Command delivery application ports

          Status: production migration slice  
          Scope: existing device command polling and acknowledgement routes

          ## Contract

          `mobile-proxy-application` owns transport-independent ports for polling the oldest pending command for one device, acknowledging successful execution, and reporting a retryable negative acknowledgement without deleting the command. Axum authenticates the request, converts path and JSON values to typed inputs, invokes one port and maps typed outcomes. The application crate has no runtime, filesystem, process, network or framework dependency.

          ## Compatibility

          The existing HTTP surface is unchanged:

          - `GET /api/v1/devices/{id}/commands/next` returns either the command object or JSON `null`;
          - successful and negative acknowledgements return `{ "accepted": true }`;
          - a repeated successful acknowledgement for a command that is no longer pending returns `{ "accepted": false }`;
          - device and admin bearer-token separation remains unchanged.

          ## Persistence ordering

          Successful acknowledgement clones the bounded command and device state, validates the queue key and command identity, removes the pending command, clears the device recovery intent, fsyncs and atomically renames the complete JSON candidate, and only then publishes the candidate in memory. A failed write returns `state_persistence_failed` and leaves the in-memory command pending. Negative acknowledgement does not mutate durable state and remains safe for repeated delivery.

          ## Explicitly deferred

          SQLite transactions, durable acknowledgement history, claim leases, attempt counters, domain events, audit, outbox, per-device cryptographic identity and deadline expiry remain later bounded slices. Registration, heartbeat and public-probe handlers remain transitional.
          ''',
              encoding="utf-8",
          )
          PY

      - name: Enforce architecture boundaries
        run: |
          python3 scripts/check_architecture_boundaries.py
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Format and validate
        run: |
          cargo fmt --all
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
          git diff --check

      - name: Publish clean branch
        run: |
          rm -rf .agent
          rm .github/workflows/command-delivery-builder.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Extract command delivery application ports"
          git push origin HEAD:agent/command-delivery-application-ports
