name: Command Delivery Builder

on:
  push:
    branches:
      - agent/command-delivery-application-ports
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/command-delivery-application-ports

      - name: Apply production slice
        id: apply
        continue-on-error: true
        run: |
          python3 - <<'PY' > command-delivery-builder.log 2>&1
          from pathlib import Path
          from textwrap import dedent

          builder = Path(".agent/build.py")
          builder_body = builder.read_text(encoding="utf-8")
          old_diagnostic = 'raise SystemExit(f"{path}: expected exactly one replacement anchor, found {count}")'
          new_diagnostic = 'raise SystemExit(f"{path}: expected exactly one replacement anchor, found {count}: {old!r}")'
          if builder_body.count(old_diagnostic) != 1:
              raise SystemExit("builder diagnostic anchor drifted")
          builder_body = builder_body.replace(old_diagnostic, new_diagnostic, 1)

          generic_route_call = dedent("""\
          replace_once(
              "contracts/governance/invariant-enforcement.json",
              '''        "crates/application/src/command_issue.rs",
              "services/control-plane/src/routes.rs"
          ''',
              '''        "crates/application/src/command_issue.rs",
              "crates/application/src/command_delivery.rs",
              "services/control-plane/src/routes.rs"
          ''',
          )
          """)
          if builder_body.count(generic_route_call) != 1:
              raise SystemExit("generic governance route evidence builder anchor drifted")
          builder.write_text(
              builder_body.replace(generic_route_call, "", 1),
              encoding="utf-8",
          )

          path = Path("contracts/governance/invariant-enforcement.json")
          body = path.read_text(encoding="utf-8")
          state_old = dedent("""\
                  "crates/application/src/command_issue.rs",
                  "services/control-plane/src/state.rs"
          """)
          state_new = dedent("""\
                  "crates/application/src/command_issue.rs",
                  "crates/application/src/command_delivery.rs",
                  "services/control-plane/src/state.rs"
          """)
          if body.count(state_old) != 2:
              raise SystemExit(
                  f"governance state evidence: expected exactly two anchors, found {body.count(state_old)}"
              )
          body = body.replace(state_old, state_new, 1)

          arch_route_old = dedent("""\
                "ARCH-005",
                "A1",
                "Decision 8",
                "Transport handlers only authenticate, authorize, validate, call one use case and map a typed result",
                "partially_enforced",
                "application",
                [
                  "crates/application/src/command_issue.rs",
                  "services/control-plane/src/routes.rs"
                ],
          """)
          arch_route_new = dedent("""\
                "ARCH-005",
                "A1",
                "Decision 8",
                "Transport handlers only authenticate, authorize, validate, call one use case and map a typed result",
                "partially_enforced",
                "application",
                [
                  "crates/application/src/command_issue.rs",
                  "crates/application/src/command_delivery.rs",
                  "services/control-plane/src/routes.rs"
                ],
          """)
          if body.count(arch_route_old) != 1:
              raise SystemExit(
                  f"ARCH-005 evidence: expected exactly one anchor, found {body.count(arch_route_old)}"
              )
          path.write_text(body.replace(arch_route_old, arch_route_new, 1), encoding="utf-8")
          PY
          python3 .agent/build.py >> command-delivery-builder.log 2>&1

      - name: Upload builder diagnosis
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: command-delivery-builder-diagnosis
          path: command-delivery-builder.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce builder result
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Enforce architecture boundaries
        run: |
          python3 scripts/check_architecture_boundaries.py
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Format and validate
        run: |
          cargo fmt --all
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
          git diff --check

      - name: Publish clean branch
        run: |
          rm -rf .agent
          rm .github/workflows/command-delivery-builder.yml
          rm -f command-delivery-builder.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Extract command delivery application ports"
          git push origin HEAD:agent/command-delivery-application-ports
