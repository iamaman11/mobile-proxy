name: Command Delivery Builder

on:
  push:
    branches:
      - agent/command-delivery-application-ports

permissions:
  contents: write

concurrency:
  group: command-delivery-builder
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/command-delivery-application-ports

      - name: Finalize and validate
        id: validate
        continue-on-error: true
        run: |
          set +e
          {
            python3 .agent/finalize.py
            python3 scripts/check_architecture_boundaries.py
            python3 -m unittest discover -s scripts/tests -p 'test_*.py'
            rustup toolchain install stable --profile minimal --component rustfmt,clippy
            rustup default stable
            cargo fmt --all
            cargo clippy --workspace --all-targets -- -D warnings
            cargo test --workspace
            git diff --check
          } > .agent/finalizer-diagnosis.log 2>&1
          status=$?
          echo "exit_status=$status" >> .agent/finalizer-diagnosis.log
          exit "$status"

      - name: Publish failure diagnosis
        if: steps.validate.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture command delivery finalizer failure"
          git push origin HEAD:agent/command-delivery-application-ports

      - name: Enforce validation result
        if: steps.validate.outcome == 'failure'
        run: exit 1

      - name: Publish clean branch
        if: steps.validate.outcome == 'success'
        run: |
          rm -rf .agent
          rm .github/workflows/command-delivery-builder.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Extract command delivery application ports"
          git push origin HEAD:agent/command-delivery-application-ports
