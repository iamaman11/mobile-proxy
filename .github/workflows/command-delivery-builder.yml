name: Command Delivery Builder

on:
  push:
    branches:
      - agent/command-delivery-application-ports
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/command-delivery-application-ports

      - name: Apply production slice
        id: apply
        continue-on-error: true
        run: python3 .agent/build.py > command-delivery-builder.log 2>&1

      - name: Upload builder diagnosis
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: command-delivery-builder-diagnosis
          path: command-delivery-builder.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce builder result
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Enforce architecture boundaries
        run: |
          python3 scripts/check_architecture_boundaries.py
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Format and validate
        run: |
          cargo fmt --all
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
          git diff --check

      - name: Publish clean branch
        run: |
          rm -rf .agent
          rm .github/workflows/command-delivery-builder.yml
          rm -f command-delivery-builder.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Extract command delivery application ports"
          git push origin HEAD:agent/command-delivery-application-ports
