name: Temporary Phase B Snapshot Builder

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/phase-b-state-snapshot-mapping

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-state-snapshot-mapping

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Check and publish minimal lockfile
        id: check
        run: |
          set +e
          cargo fmt --all -- --check 2>&1 | tee rustfmt.log
          fmt_status=${PIPESTATUS[0]}
          cargo check --workspace --all-targets 2>&1 | tee cargo-check.log
          check_status=${PIPESTATUS[0]}
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock
          if ! git diff --cached --quiet; then
            git commit -m "Update snapshot path dependencies [skip ci]"
            git push origin HEAD:agent/phase-b-state-snapshot-mapping
          fi
          if [ "$fmt_status" -ne 0 ] || [ "$check_status" -ne 0 ]; then
            exit 1
          fi

      - name: Run strict Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings 2>&1 | tee clippy.log

      - name: Run workspace tests
        run: cargo test --workspace 2>&1 | tee tests.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phase-b-snapshot-diagnostics
          path: |
            rustfmt.log
            cargo-check.log
            clippy.log
            tests.log
          if-no-files-found: ignore
          retention-days: 2
