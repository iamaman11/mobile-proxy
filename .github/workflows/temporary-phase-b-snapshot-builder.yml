name: Temporary Phase B Snapshot Builder

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-state-snapshot-mapping
          fetch-depth: 0

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Restore main lock and add only snapshot dependency edges
        run: |
          git fetch origin main
          git checkout origin/main -- Cargo.lock
          python3 - <<'PY'
          from pathlib import Path

          path = Path("Cargo.lock")
          text = path.read_text()
          old = '''[[package]]
          name = "mobile-proxy-control-plane-sqlite"
          version = "0.1.0"
          dependencies = [
           "rusqlite",
          ]
          '''
          new = '''[[package]]
          name = "mobile-proxy-control-plane-sqlite"
          version = "0.1.0"
          dependencies = [
           "mobile-proxy-application",
           "mobile-proxy-foundation",
           "proxy-core",
           "rusqlite",
           "serde",
           "serde_json",
          ]
          '''
          if text.count(old) != 1:
              raise SystemExit("expected exactly one SQLite package block in main Cargo.lock")
          path.write_text(text.replace(old, new))
          PY

      - name: Validate minimal locked candidate
        run: |
          cargo fmt --all -- --check
          cargo check --workspace --all-targets --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked

      - name: Publish minimal lockfile
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock
          git commit -m "Update snapshot dependency edges [skip ci]"
          git push origin HEAD:agent/phase-b-state-snapshot-mapping
