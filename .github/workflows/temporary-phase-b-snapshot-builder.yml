name: Temporary Phase B Snapshot Builder

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/phase-b-state-snapshot-mapping

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-state-snapshot-mapping

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Resolve existing lockfile and validate
        run: |
          cargo fmt --all -- --check
          cargo check --workspace --all-targets
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock
          if ! git diff --cached --quiet; then
            git commit -m "Update snapshot path dependencies [skip ci]"
            git push origin HEAD:agent/phase-b-state-snapshot-mapping
          fi
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
