name: Source Export Builder

on:
  pull_request:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Archive exact source
        run: |
          git rev-parse HEAD > SOURCE_SHA
          tar --exclude=.git -czf mobile-proxy-source.tar.gz .

      - name: Upload source archive
        uses: actions/upload-artifact@v7
        with:
          name: mobile-proxy-source
          path: mobile-proxy-source.tar.gz
          if-no-files-found: error
          retention-days: 1
