name: Phase B Builder

on:
  push:
    branches:
      - agent/phase-b-sqlite-foundation

permissions:
  contents: write

jobs:
  generate:
    if: github.event.head_commit.message != 'Generate Phase B artifacts'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Generate formatted source and lockfile
        run: |
          cargo fmt --all
          cargo generate-lockfile

      - name: Commit generated artifacts
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock crates/control-plane-sqlite/src/lib.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Generate Phase B artifacts'
          git push
