name: Temporary Phase B Snapshot Store Builder

on:
  push:
    branches:
      - agent/phase-b-snapshot-store-boundary

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-snapshot-store-boundary

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Publish canonical formatting
        run: |
          cargo fmt --all
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/control-plane-sqlite/src/snapshot.rs crates/control-plane-sqlite/src/snapshot_store_tests.rs
          if ! git diff --cached --quiet; then
            git commit -m "Apply snapshot store formatting [skip ci]"
            git push origin HEAD:agent/phase-b-snapshot-store-boundary
          fi

      - name: Run strict Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace
