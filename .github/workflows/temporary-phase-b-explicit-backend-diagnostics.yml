name: Temporary Phase B Explicit Backend Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-explicit-sqlite-backend

      - name: Inspect exact patch anchors
        run: |
          python3 - <<'PY' | tee anchors.log
          from pathlib import Path
          body = Path('services/control-plane/src/state.rs').read_text()
          patterns = {
              'load': '    pub async fn load(state_path: PathBuf) -> Result<Self> {',
              'persist_for_test': '''    #[cfg(test)]
              async fn persist_for_test(&self) -> Result<()> {
                  let devices = self.devices.lock().await;
                  let commands = self.commands.lock().await;
                  let stored = StoredState {
                      devices: devices.clone(),
                      commands: commands.clone(),
                  };
                  write_stored_state(self.state_path.as_ref(), &stored)
              }
          ''',
              'register': '''        let stored = StoredState {
                      devices: devices.clone(),
                      commands: commands_guard.clone(),
                  };
                  write_stored_state(self.state_path.as_ref(), &stored)
                      .map_err(|_| RegisterDeviceError::Persistence)?;
          ''',
              'heartbeat': '''        let stored = StoredState {
                      devices: devices.clone(),
                      commands: commands_guard.clone(),
                  };
                  write_stored_state(self.state_path.as_ref(), &stored)
                      .map_err(|_| HeartbeatError::Persistence)?;
          ''',
              'probe': '''        let stored = StoredState {
                      devices: devices.clone(),
                      commands: commands_guard.clone(),
                  };
                  write_stored_state(self.state_path.as_ref(), &stored)
                      .map_err(|_| PublicProbeError::Persistence)?;
          ''',
              'ack': '''        let stored = StoredState {
                      devices: devices.clone(),
                      commands: commands.clone(),
                  };
                  write_stored_state(self.state_path.as_ref(), &stored)
                      .map_err(|_| AcknowledgeCommandError::Persistence)?;
          ''',
              'issue_anchor': '''        let mut devices = devices_guard.clone();
              let mut commands = commands_guard.clone();

              let migration =
          ''',
              'issue_persist': 'persist_candidate(self.state_path.as_ref(), &devices, &commands)?;',
              'test_struct_path': 'state_path: Arc::new(',
          }
          for name, pattern in patterns.items():
              print(f'{name}={body.count(pattern)}')
          PY

      - name: Upload patch anchors
        uses: actions/upload-artifact@v7
        with:
          name: explicit-backend-patch-anchors
          path: anchors.log
          if-no-files-found: error
          retention-days: 2
