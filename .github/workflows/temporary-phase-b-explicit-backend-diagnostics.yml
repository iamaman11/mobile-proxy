name: Temporary Phase B Explicit Backend Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-explicit-sqlite-backend

      - name: Inspect exact patch anchors
        run: |
          python3 - <<'PY'
          from pathlib import Path
          body = Path('services/control-plane/src/state.rs').read_text()
          patterns = {
