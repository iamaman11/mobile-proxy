name: Temporary Patch Publisher

on:
  pull_request:
    paths:
      - ".github/workflows/temp-source-export.yml"

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/phase-b-retire-json-runtime'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Transform runtime ownership
        run: python -u .tmp/retire_json.py
      - name: Transform process acceptance
        run: python -u .tmp/modify_process.py
      - name: Transform documentation
        run: |
          python -u .tmp/update_docs.py
          sed -i 's/[[:space:]]\+$//' \
            docs/architecture/control-plane-explicit-state-backend.md \
            docs/architecture/control-plane-sqlite-default-cutover.md \
            docs/architecture/control-plane-sqlite-process-acceptance.md \
            docs/architecture/control-plane-sqlite-runtime-retirement.md
      - name: Verify patch whitespace
        run: git diff --check
      - name: Publish branch update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Retire JSON from control-plane runtime"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
