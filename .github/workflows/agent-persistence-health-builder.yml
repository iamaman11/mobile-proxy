name: Agent Persistence Health Builder

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.head_ref == 'agent/tunnel-counter-persistence-health-builder'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out builder source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Apply production slice
        run: python3 .agent/apply_persistence_health.py

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Format source
        run: cargo fmt --all

      - name: Verify formatting
        run: cargo fmt --all -- --check

      - name: Run strict Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Publish clean final branch
        run: |
          rm -rf .agent
          rm .github/workflows/agent-persistence-health-builder.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Expose tunnel counter persistence health"
          git push origin HEAD:refs/heads/agent/tunnel-counter-persistence-health
