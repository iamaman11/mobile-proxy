name: Temporary Phase B Open Existing PR Runner

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-explicit-sqlite-backend

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Execute embedded no-create patch
        id: apply
        continue-on-error: true
        run: |
          set -o pipefail
          (
            python3 - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          workflow = Path('.github/workflows/temporary-phase-b-open-existing-builder.yml').read_text()
          start = "          python3 - <<'PY'\n"
          end = "\n          PY\n"
          if workflow.count(start) != 1:
              raise SystemExit(f'expected one embedded patch start, found {workflow.count(start)}')
          embedded = workflow.split(start, 1)[1]
          if embedded.count(end) != 1:
              raise SystemExit(f'expected one embedded patch end, found {embedded.count(end)}')
          source = dedent(embedded.split(end, 1)[0])
          exec(compile(source, '<embedded-open-existing-patch>', 'exec'), {'__name__': '__main__'})
          PY
            cargo fmt --all
            cargo check --workspace --all-targets
          ) 2>&1 | tee open-existing-build.log

      - name: Upload no-create build diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: open-existing-build-diagnostics
          path: open-existing-build.log
          if-no-files-found: error
          retention-days: 2

      - name: Publish no-create source
        if: steps.apply.outcome == 'success'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/control-plane-sqlite/src/lib.rs services/control-plane/src/state_sqlite_backend.rs services/control-plane/src/state_sqlite_backend_tests.rs
          git commit -m "Require preexisting migrated SQLite runtime state [skip ci]"
          git push origin HEAD:agent/phase-b-explicit-sqlite-backend

      - name: Enforce no-create build
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Run strict Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace
