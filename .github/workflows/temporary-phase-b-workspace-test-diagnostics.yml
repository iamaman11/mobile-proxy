name: Temporary Phase B Workspace Test Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-explicit-sqlite-backend

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Capture workspace test diagnostics
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          cargo test --workspace 2>&1 | tee workspace-tests.log

      - name: Upload workspace test diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phase-b-workspace-test-diagnostics
          path: workspace-tests.log
          if-no-files-found: error
          retention-days: 2

      - name: Enforce workspace tests
        if: steps.tests.outcome == 'failure'
        run: exit 1
