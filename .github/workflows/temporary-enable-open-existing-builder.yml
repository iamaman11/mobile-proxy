name: Temporary Enable Open Existing Builder

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  enable:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-explicit-sqlite-backend

      - name: Enable PR builder once
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/temporary-phase-b-open-existing-builder.yml')
          body = path.read_text()
          trigger = '''on:
            push:
          '''
          replacement = '''on:
            pull_request:
              branches:
                - main
            push:
          '''
          if body.count(trigger) != 1:
              raise SystemExit(f'expected one push trigger, found {body.count(trigger)}')
          body = body.replace(trigger, replacement, 1)
          guard = "    if: github.actor != 'github-actions[bot]'\n"
          if body.count(guard) != 1:
              raise SystemExit(f'expected one actor guard, found {body.count(guard)}')
          path.write_text(body.replace(guard, '', 1))
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/temporary-phase-b-open-existing-builder.yml
          git commit -m "Enable temporary no-create SQLite builder"
          git push origin HEAD:agent/phase-b-explicit-sqlite-backend
