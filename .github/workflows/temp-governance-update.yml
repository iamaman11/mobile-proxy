name: Temporary Governance Update

on:
  pull_request:
    paths:
      - ".github/workflows/temp-governance-update.yml"

permissions:
  contents: write

jobs:
  update:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/phase-b-retire-json-runtime'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Update invariant ownership
        run: python -u .tmp/update_digest_invariants.py
      - name: Validate governance update
        run: |
          python3 scripts/check_architecture_boundaries.py
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'
      - name: Remove temporary updater
        run: git rm .tmp/update_digest_invariants.py .github/workflows/temp-governance-update.yml
      - name: Publish clean governance update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Move legacy fingerprint governance to import layer"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
