name: Temporary Phase B Legacy Import Builder

on:
  push:
    branches:
      - agent/phase-b-legacy-json-import

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-legacy-json-import

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Wire and format importer
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/control-plane-sqlite/src/lib.rs')
          body = path.read_text()
          if 'mod legacy_json_import;' not in body:
              body = body.replace('mod snapshot_error;', 'mod legacy_json_import;\nmod snapshot_error;', 1)
          export = '''pub use legacy_json_import::{
              LegacyJsonImportError, LegacyJsonImportOutcome, LegacyJsonImportReport,
              LegacyJsonMigrationStats, LegacyJsonViolation, parse_legacy_json,
          };
          '''
          if 'pub use legacy_json_import::' not in body:
              body = body.replace('pub use snapshot::{', export + '\npub use snapshot::{', 1)
          if 'mod legacy_json_import_tests;' not in body:
              body = body.replace(
                  '#[cfg(test)]\nmod snapshot_store_tests;',
                  '#[cfg(test)]\nmod legacy_json_import_tests;\n#[cfg(test)]\nmod snapshot_store_tests;',
                  1,
              )
          path.write_text(body)
          PY
          cargo fmt --all
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/control-plane-sqlite/src/lib.rs crates/control-plane-sqlite/src/legacy_json_import.rs crates/control-plane-sqlite/src/legacy_json_import_tests.rs
          if ! git diff --cached --quiet; then
            git commit -m "Wire and format legacy JSON importer [skip ci]"
            git push origin HEAD:agent/phase-b-legacy-json-import
          fi

      - name: Run strict Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace
