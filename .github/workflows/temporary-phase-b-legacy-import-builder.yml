name: Temporary Phase B Legacy Import Builder

on:
  push:
    branches:
      - agent/phase-b-legacy-json-import

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-legacy-json-import

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Apply focused compile fix and format
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/control-plane-sqlite/src/legacy_json_import.rs')
          body = path.read_text()
          old = '''    for (device_id, queue) in &commands.queues {
              for command in queue {
                  if command.device_id != *device_id {
                      return Err(SnapshotViolation::PendingDeviceMismatch.into());
                  }
                  let canonical = canonical_scope(command);
                  match commands.idempotency_results.get(&canonical) {
                      Some(existing) if existing != command => {
                          return Err(LegacyJsonViolation::ConflictingCommandResult.into());
                      }
                      Some(_) => {}
                      None => {
                          commands
                              .idempotency_results
                              .insert(canonical, command.clone());
                          stats.recovered_command_results += 1;
                      }
                  }
                  ensure_legacy_claim(commands, command, stats)?;
              }
          }
          '''
          new = '''    let queued_commands = commands
              .queues
              .iter()
              .flat_map(|(device_id, queue)| {
                  queue
                      .iter()
                      .cloned()
                      .map(|command| (device_id.clone(), command))
                      .collect::<Vec<_>>()
              })
              .collect::<Vec<_>>();
          for (device_id, command) in queued_commands {
              if command.device_id != device_id {
                  return Err(SnapshotViolation::PendingDeviceMismatch.into());
              }
              let canonical = canonical_scope(&command);
              match commands.idempotency_results.get(&canonical) {
                  Some(existing) if existing != &command => {
                      return Err(LegacyJsonViolation::ConflictingCommandResult.into());
                  }
                  Some(_) => {}
                  None => {
                      commands
                          .idempotency_results
                          .insert(canonical, command.clone());
                      stats.recovered_command_results += 1;
                  }
              }
              ensure_legacy_claim(commands, &command, stats)?;
          }
          '''
          if old not in body:
              raise SystemExit('expected queue normalization block not found')
          path.write_text(body.replace(old, new, 1))
          PY
          cargo fmt --all
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/control-plane-sqlite/src/legacy_json_import.rs
          if ! git diff --cached --quiet; then
            git commit -m "Fix legacy queue normalization borrow [skip ci]"
            git push origin HEAD:agent/phase-b-legacy-json-import
          fi

      - name: Run strict Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace
