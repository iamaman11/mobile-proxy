name: Open Pending Stream Audit PR

on:
  push:
    branches:
      - agent/open-pending-stream-audit-pr

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  open:
    runs-on: ubuntu-latest
    steps:
      - name: Open audit pull request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -o pipefail
          if [ "$(gh pr list --repo "$GITHUB_REPOSITORY" --head agent/phase-c-pending-stream-lifecycle-audit --base main --state open --json number --jq 'length')" != "0" ]; then
            exit 0
          fi
          body=$'## Decision\n\nDelivery item 8 requires no new runtime implementation. The accepted reserve TLS/TCP registry already provides deterministic cleanup, bounded expiry, explicit global/per-device capacity and fail-closed exhaustion without eviction.\n\n## Scope\n\n- records the current-code lifecycle and capacity audit;\n- links each terminal cleanup path to the owning implementation and executable evidence;\n- preserves all protected proxy, QUIC, TLS/TCP reserve and WireGuard compatibility behavior;\n- explicitly leaves exact device/session routing authority to delivery item 9.\n\n## Validation\n\nThis branch is one documentation-only commit ahead of current `main` and zero commits behind. The audit cites the original accepted implementation and the latest successful Phase B closeout validation.\n\nCloses #50'
          set +e
          output=$(gh api \
            --method POST \
            "repos/$GITHUB_REPOSITORY/pulls" \
            -f title='Audit pending-stream lifecycle and bounds' \
            -f head='agent/phase-c-pending-stream-lifecycle-audit' \
            -f base='main' \
            -f body="$body" 2>&1)
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            printf 'One-shot PR opener failed:\n\n```text\n%s\n```\n' "$output" > /tmp/pr-opener-failure.md
            gh issue comment 50 --repo "$GITHUB_REPOSITORY" --body-file /tmp/pr-opener-failure.md
            exit "$status"
          fi
          gh issue comment 50 --repo "$GITHUB_REPOSITORY" --body 'The documentation-only acceptance PR was opened by the repository-scoped one-shot workflow after the connector create-PR endpoint returned an external 502.'
