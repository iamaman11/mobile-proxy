name: Agent Public Probe Builder

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: agent-public-probe-builder
  cancel-in-progress: true

jobs:
  build:
    name: Validate and publish public-probe application port
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Check out isolated builder inputs
        uses: actions/checkout@v7
        with:
          ref: agent/public-probe-application-port-builder

      - name: Decode exact production files
        run: |
          cat \
            .agent/public-probe-files.tar.gz.b64.00 \
            .agent/public-probe-files.tar.gz.b64.01a \
            .agent/public-probe-files.tar.gz.b64.01c0 \
            .agent/public-probe-files.tar.gz.b64.01c1 \
            .agent/public-probe-files.tar.gz.b64.01c2 \
            .agent/public-probe-files.tar.gz.b64.01c3 \
            .agent/public-probe-files.tar.gz.b64.02 \
            .agent/public-probe-files.tar.gz.b64.03 \
            .agent/public-probe-files.tar.gz.b64.04 \
            | tr -d '\n' > /tmp/public-probe-files.b64
          echo "7a20b6f7dbca3e56f88491f5695c2c02709020181cc1aad615a16d053263828d  /tmp/public-probe-files.b64" | sha256sum --check --strict
          base64 --decode /tmp/public-probe-files.b64 > /tmp/public-probe-files.tar.gz
          echo "a6cc24790e303d308a6c8433c74892715dab383d1a8390a22e0c929bd3664f2a  /tmp/public-probe-files.tar.gz" | sha256sum --check --strict
          mkdir -p /tmp/public-probe-files
          tar -xzf /tmp/public-probe-files.tar.gz -C /tmp/public-probe-files

      - name: Check out exact production branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags origin agent/public-probe-application-port
          git checkout -B agent/public-probe-application-port origin/agent/public-probe-application-port
          test "$(git rev-parse HEAD)" = "4c48d08fc2f06f24c9bc23431547f425078d2eb7"

      - name: Install bounded public-probe slice
        run: |
          mkdir -p crates/application/src docs/architecture services/control-plane/src contracts/governance
          cp /tmp/public-probe-files/contracts/governance/invariant-enforcement.json contracts/governance/invariant-enforcement.json
          cp /tmp/public-probe-files/crates/application/src/lib.rs crates/application/src/lib.rs
          cp /tmp/public-probe-files/crates/application/src/public_probe.rs crates/application/src/public_probe.rs
          cp /tmp/public-probe-files/docs/architecture/invariant-enforcement.md docs/architecture/invariant-enforcement.md
          cp /tmp/public-probe-files/docs/architecture/public-probe-application-port.md docs/architecture/public-probe-application-port.md
          cp /tmp/public-probe-files/services/control-plane/src/routes.rs services/control-plane/src/routes.rs
          cp /tmp/public-probe-files/services/control-plane/src/state.rs services/control-plane/src/state.rs
          python3 - <<'PY'
          from pathlib import Path

          input_path = Path("crates/application/src/public_probe.rs")
          input_body = input_path.read_text(encoding="utf-8")
          input_old = "#[derive(Debug, Clone, PartialEq, Eq)]\npub struct PublicProbeInput"
          input_new = "#[derive(Debug, Clone)]\npub struct PublicProbeInput"
          if input_body.count(input_old) != 1:
              raise SystemExit("unexpected PublicProbeInput derive shape")
          input_path.write_text(input_body.replace(input_old, input_new), encoding="utf-8")

          state_path = Path("services/control-plane/src/state.rs")
          state_body = state_path.read_text(encoding="utf-8")
          signature_old = "    pub async fn persist(&self) -> Result<()> {"
          signature_new = "    #[cfg(test)]\n    async fn persist_for_test(&self) -> Result<()> {"
          if state_body.count(signature_old) != 1:
              raise SystemExit("unexpected AppState::persist signature count")
          state_body = state_body.replace(signature_old, signature_new, 1)
          call_old = "state.persist().await.unwrap();"
          if state_body.count(call_old) != 3:
              raise SystemExit("unexpected AppState::persist test call count")
          state_body = state_body.replace(call_old, "state.persist_for_test().await.unwrap();")
          readiness_old = '                "readiness_state": "ready",'
          readiness_new = '                "readiness_state": "healthy",'
          if state_body.count(readiness_old) != 1:
              raise SystemExit("unexpected heartbeat test readiness fixture count")
          state_body = state_body.replace(readiness_old, readiness_new, 1)
          state_path.write_text(state_body, encoding="utf-8")
          PY
          git diff --check

      - name: Validate governance and Python regressions
        run: |
          python3 scripts/check_architecture_boundaries.py
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Capture Rust validation
        id: rust
        shell: bash
        run: |
          set +e
          : > /tmp/rust-diagnostic.log
          cargo fmt --all >> /tmp/rust-diagnostic.log 2>&1
          fmt_status=$?
          cargo fmt --all -- --check >> /tmp/rust-diagnostic.log 2>&1
          fmt_check_status=$?
          cargo clippy --quiet --workspace --all-targets --message-format=short -- -D warnings >> /tmp/rust-diagnostic.log 2>&1
          clippy_status=$?
          if [ "$clippy_status" -eq 0 ]; then
            cargo test --quiet --workspace >> /tmp/rust-diagnostic.log 2>&1
            test_status=$?
          else
            test_status=0
          fi
          status=0
          for candidate in "$fmt_status" "$fmt_check_status" "$clippy_status" "$test_status"; do
            if [ "$candidate" -ne 0 ]; then
              status="$candidate"
              break
            fi
          done
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Rust diagnostic
        if: steps.rust.outputs.status != '0'
        uses: actions/upload-artifact@v7
        with:
          name: public-probe-rust-diagnostic
          path: /tmp/rust-diagnostic.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail on Rust validation error
        if: steps.rust.outputs.status != '0'
        run: |
          tail -n 160 /tmp/rust-diagnostic.log
          exit 1

      - name: Verify exact production scope
        run: |
          git diff --check
          test "$(git status --short | awk '{print $2}' | sort)" = "$(printf '%s\n' \
            contracts/governance/invariant-enforcement.json \
            crates/application/src/lib.rs \
            crates/application/src/public_probe.rs \
            docs/architecture/invariant-enforcement.md \
            docs/architecture/public-probe-application-port.md \
            services/control-plane/src/routes.rs \
            services/control-plane/src/state.rs | sort)"

      - name: Commit and push clean production branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            contracts/governance/invariant-enforcement.json \
            crates/application/src/lib.rs \
            crates/application/src/public_probe.rs \
            docs/architecture/invariant-enforcement.md \
            docs/architecture/public-probe-application-port.md \
            services/control-plane/src/routes.rs \
            services/control-plane/src/state.rs
          git commit -m "Extract public-probe application port"
          git push origin HEAD:agent/public-probe-application-port
