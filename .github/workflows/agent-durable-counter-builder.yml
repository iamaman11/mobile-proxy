name: Agent Durable Counter Builder

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.head_ref == 'agent/durable-tunnel-counters-builder'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out builder source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Apply production slice
        id: apply
        continue-on-error: true
        run: |
          set -o pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.agent/apply_durable_counters.py')
          body = path.read_text()
          old = '''def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              body = target.read_text()
              count = body.count(old)
              if count != 1:
                  raise RuntimeError(f"expected one match in {path}, found {count}: {old[:120]!r}")
              target.write_text(body.replace(old, new, 1))
          '''
          new = '''def replace_once(path: str, old: str, new: str) -> None:
              print(f"applying {path}: {old[:100]!r}", flush=True)
              target = Path(path)
              body = target.read_text()
              count = body.count(old)
              paired_test_anchor = (
                  path == "crates/reverse-tunnel/src/tunnel.rs"
                  and old.startswith("        assert_eq!(client_snapshot.last_failover_reason, None);")
              )
              if paired_test_anchor and count in (1, 2):
                  target.write_text(body.replace(old, new, 1))
                  return
              if count != 1:
                  raise RuntimeError(f"expected one match in {path}, found {count}: {old[:120]!r}")
              target.write_text(body.replace(old, new, 1))
          '''
          if body.count(old) != 1:
              raise SystemExit('failed to patch builder replacement helper')
          path.write_text(body.replace(old, new, 1))
          PY
          {
            python3 .agent/apply_durable_counters.py
            python3 .agent/postprocess_durable_counters.py
          } 2>&1 | tee .agent/apply.log

      - name: Upload apply diagnostics
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: durable-counter-apply-diagnostics
          path: .agent/apply.log
          if-no-files-found: error
          retention-days: 2

      - name: Enforce successful application
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Format source
        run: cargo fmt --all

      - name: Verify formatting
        run: cargo fmt --all -- --check

      - name: Run strict Clippy
        id: clippy
        continue-on-error: true
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets -- -D warnings 2>&1 | tee .agent/clippy.log

      - name: Upload Clippy diagnostics
        if: steps.clippy.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: durable-counter-clippy-diagnostics
          path: .agent/clippy.log
          if-no-files-found: error
          retention-days: 2

      - name: Enforce strict Clippy
        if: steps.clippy.outcome == 'failure'
        run: exit 1

      - name: Run workspace tests
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          cargo test --workspace 2>&1 | tee .agent/tests.log

      - name: Upload test diagnostics
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: durable-counter-test-diagnostics
          path: .agent/tests.log
          if-no-files-found: error
          retention-days: 2

      - name: Enforce workspace tests
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Publish clean final branch
        run: |
          rm -rf .agent
          rm .github/workflows/agent-durable-counter-builder.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Add durable reverse tunnel event counters"
          git push origin HEAD:refs/heads/agent/durable-tunnel-counters
