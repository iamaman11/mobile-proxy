name: Agent Runtime Fingerprint Builder

on:
  push:
    branches:
      - agent/runtime-fingerprint-migration-builder
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: agent-runtime-fingerprint-builder-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build clean runtime fingerprint slice
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Fetch builder inputs quietly
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --no-tags --depth=1 origin agent/runtime-fingerprint-migration-builder
          git checkout -q FETCH_HEAD

      - name: Reassemble isolated migration payload
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import lzma

          expected = [
              Path(".agent/runtime-fingerprint.xz.00"),
              Path(".agent/runtime-fingerprint.xz.01"),
              Path(".agent/runtime-fingerprint.xz.02a"),
              Path(".agent/runtime-fingerprint.xz.02b"),
              Path(".agent/runtime-fingerprint.xz.03"),
          ]
          actual = sorted(Path(".agent").glob("runtime-fingerprint.xz.*"))
          if actual != expected:
              raise SystemExit(f"unexpected migration payload chunks: {actual!r}")
          encoded = b"".join(path.read_bytes() for path in expected)
          compressed = base64.b64decode(encoded, validate=True)
          Path("/tmp/runtime-fingerprint.tar").write_bytes(lzma.decompress(compressed))
          PY

      - name: Reset production branch to exact main
        run: |
          git fetch -q --no-tags --depth=1 origin a6d289b9c8bc93a2bc961d6630dc124f71436746
          git checkout -q -B agent/runtime-fingerprint-migration a6d289b9c8bc93a2bc961d6630dc124f71436746

      - name: Apply bounded migration
        run: tar -xf /tmp/runtime-fingerprint.tar

      - name: Validate invariant matrix
        run: python3 scripts/check_invariant_enforcement.py

      - name: Validate architecture
        run: python3 scripts/check_architecture_boundaries.py

      - name: Validate Python regressions
        run: python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Validate Rust workspace
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Publish clean source branch
        run: |
          git diff --check
          test ! -e .agent
          test ! -e .github/workflows/agent-runtime-fingerprint-builder.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            crates/proxy-core/src/fingerprints.rs \
            crates/proxy-core/src/lib.rs \
            crates/proxy-core/src/records.rs \
            services/host-daemon/src/fingerprints.rs \
            services/host-daemon/src/main.rs \
            services/host-daemon/src/config.rs \
            services/host-daemon/src/control_plane.rs \
            services/control-plane/src/fingerprint_migration.rs \
            services/control-plane/src/main.rs \
            services/control-plane/src/state.rs \
            apps/operator-cli/src/commands.rs \
            services/host-daemon/src/api.rs \
            services/host-daemon/src/rotation.rs \
            config/host-daemon.example.env \
            docs/architecture/runtime-fingerprint-migration.md \
            docs/architecture/digest-inventory-and-migration.md \
            contracts/governance/invariant-enforcement.json \
            docs/architecture/invariant-enforcement.md
          test -z "$(git status --short | grep '^??' || true)"
          git commit -m "Migrate runtime fingerprints to typed BLAKE3"
          git fetch -q --no-tags origin agent/runtime-fingerprint-migration
          git push --force-with-lease origin agent/runtime-fingerprint-migration
