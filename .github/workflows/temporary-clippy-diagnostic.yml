name: Temporary Clippy Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-state-snapshot-mapping

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Apply exact Clippy fix
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("crates/control-plane-sqlite/src/snapshot_tests.rs")
          text = path.read_text()
          old = 'exact_rows(&[first.clone()], &[(1, first)]),'
          new = 'exact_rows(std::slice::from_ref(&first), &[(1, first)]),'
          if text.count(old) != 1:
              raise SystemExit("expected exactly one cloned single-element slice")
          path.write_text(text.replace(old, new))
          PY
          cargo fmt --all

      - name: Verify formatting
        run: cargo fmt --all -- --check 2>&1 | tee rustfmt.log

      - name: Capture strict Clippy
        id: clippy
        continue-on-error: true
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets -- -D warnings 2>&1 | tee clippy.log

      - name: Capture workspace tests
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          cargo test --workspace 2>&1 | tee tests.log

      - name: Upload exact diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: exact-snapshot-validation
          path: |
            rustfmt.log
            clippy.log
            tests.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Preserve validation failure
        if: steps.clippy.outcome == 'failure' || steps.tests.outcome == 'failure'
        run: exit 1

      - name: Publish exact fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/control-plane-sqlite/src/snapshot_tests.rs
          git commit -m "Satisfy strict Clippy in snapshot tests [skip ci]"
          git push origin HEAD:agent/phase-b-state-snapshot-mapping
