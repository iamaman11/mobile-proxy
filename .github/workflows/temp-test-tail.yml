name: Temporary Workspace Test Tail

on:
  pull_request:
    paths:
      - ".github/workflows/temp-test-tail.yml"

permissions:
  contents: write

jobs:
  diagnose:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/phase-b-retire-json-runtime'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Replace JSON-era route test setup with real SQLite
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("services/control-plane/src/routes.rs")
          text = path.read_text(encoding="utf-8")
          old = '''    use crate::{auth::AuthConfig, projection::now_unix_secs, routes::router, state::AppState};
'''
          new = '''    use crate::{
              auth::AuthConfig,
              projection::now_unix_secs,
              routes::router,
              state::{AppState, StoredState},
              state_sqlite_backend,
          };
'''
          if text.count(old) != 1:
              raise SystemExit("expected route-test import was not found exactly once")
          text = text.replace(old, new)
          old = '''        let path = std::env::temp_dir().join(format!(
            "mobile-proxy-control-plane-{}.json",
            Uuid::new_v4()
        ));
        router(
            AppState::load(path).await.unwrap(),
'''
          new = '''        let path = std::env::temp_dir().join(format!(
            "mobile-proxy-control-plane-{}.sqlite3",
            Uuid::new_v4()
        ));
        state_sqlite_backend::replace_for_test(&path, &StoredState::default()).unwrap();
        router(
            AppState::load(path).await.unwrap(),
'''
          if text.count(old) != 1:
              raise SystemExit("expected JSON-era route test helper was not found exactly once")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          cargo fmt --all
      - name: Verify focused control-plane tests
        run: cargo test -p control-plane --bin control-plane
      - name: Remove temporary workflows
        run: |
          rm -f .github/workflows/temp-test-diagnostics.yml
          rm -f .github/workflows/temp-test-tail.yml
      - name: Commit exact repair
        shell: bash
        run: |
          git add services/control-plane/src/routes.rs \
            .github/workflows/temp-test-diagnostics.yml \
            .github/workflows/temp-test-tail.yml
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Fix SQLite route test setup"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
