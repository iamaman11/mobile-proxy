name: Temporary Phase B Explicit Backend Diagnostics

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/phase-b-explicit-sqlite-backend

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-explicit-sqlite-backend

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Verify formatting and compile
        run: |
          cargo fmt --all -- --check
          cargo check --workspace --all-targets

      - name: Capture strict Clippy diagnostics
        id: clippy
        continue-on-error: true
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets -- -D warnings 2>&1 | tee clippy.log

      - name: Upload strict Clippy diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: explicit-backend-clippy-diagnostics
          path: clippy.log
          if-no-files-found: error
          retention-days: 2

      - name: Enforce strict Clippy
        if: steps.clippy.outcome == 'failure'
        run: exit 1

      - name: Run workspace tests
        run: cargo test --workspace
