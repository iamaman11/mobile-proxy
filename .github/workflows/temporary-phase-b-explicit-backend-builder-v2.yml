name: Temporary Phase B Explicit Backend Builder V2

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/phase-b-explicit-sqlite-backend

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-explicit-sqlite-backend

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Apply explicit backend patch
        run: |
          python3 scripts/temporary_wire_explicit_state_backend.py
          cargo fmt --all
          cargo check --workspace --all-targets
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock services/control-plane
          if ! git diff --cached --quiet; then
            git commit -m "Wire explicit control-plane state backend [skip ci]"
            git push origin HEAD:agent/phase-b-explicit-sqlite-backend
          fi

      - name: Run strict Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace
