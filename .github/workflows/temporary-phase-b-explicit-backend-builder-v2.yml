name: Temporary Phase B Explicit Backend Builder

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/phase-b-explicit-sqlite-backend

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/phase-b-explicit-sqlite-backend

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Apply focused loader visibility fix
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('services/control-plane/src/state.rs')
          body = path.read_text()
          old = '''impl AppState {
              pub async fn load(state_path: PathBuf) -> Result<Self> {
          '''
          new = '''impl AppState {
              #[cfg(test)]
              pub async fn load(state_path: PathBuf) -> Result<Self> {
          '''
          if body.count(old) != 1:
              raise SystemExit(f'expected one compatibility loader, found {body.count(old)}')
          path.write_text(body.replace(old, new, 1))
          PY
          cargo fmt --all
          cargo check --workspace --all-targets
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add services/control-plane/src/state.rs
          if ! git diff --cached --quiet; then
            git commit -m "Limit compatibility state loader to tests [skip ci]"
            git push origin HEAD:agent/phase-b-explicit-sqlite-backend
          fi

      - name: Run strict Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace
