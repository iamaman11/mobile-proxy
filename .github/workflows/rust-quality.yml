name: Rust Quality

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: rust-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-quality:
    name: Format, Clippy, Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source branch
        uses: actions/checkout@v7
        with:
          ref: agent/tunnel-observability
          fetch-depth: 0

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Apply control-plane observability hardening
        run: python3 .github/agent_observability_fix7.py

      - name: Format production code
        run: cargo fmt --all

      - name: Verify formatting
        run: cargo fmt --all -- --check

      - name: Run strict Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Verify isolated final diff
        shell: bash
        run: |
          rm -f hardening-clippy-error.txt
          git diff --check
          changed="$(git diff --name-only origin/main)"
          expected=$'apps/operator-cli/src/commands.rs\ncrates/proxy-core/src/records.rs\ncrates/reverse-tunnel/src/model.rs\ncrates/reverse-tunnel/src/tunnel.rs\ncrates/reverse-tunnel/tests/hybrid_tls_fallback.rs\nservices/control-plane/src/projection.rs\nservices/control-plane/src/routes.rs\nservices/host-daemon/src/config.rs\nservices/host-daemon/src/control_plane.rs\nservices/host-daemon/src/health.rs\nservices/host-daemon/src/reverse_tunnel.rs\nservices/host-daemon/src/rotation.rs\nservices/relay-gate/src/probe.rs'
          test "$changed" = "$expected"

      - name: Commit hardened production slice
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "bound control-plane tunnel observability"
          git push origin HEAD:agent/tunnel-observability
