name: Rust Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: rust-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-quality:
    name: Format, Clippy, Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source branch
        uses: actions/checkout@v7
        with:
          ref: agent/tcp-session-bound-pending-streams
          fetch-depth: 0

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Apply bounded production slice
        run: |
          python3 <<'PY'
          from pathlib import Path
          import subprocess

          workflow_path = Path('.github/workflows/agent-apply-session-binding.yml')
          workflow = workflow_path.read_text()
          marker = "          python3 <<'PY'\n"
          raw = workflow.split(marker, 1)[1].split("\n          PY", 1)[0]
          script = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in raw.splitlines()
          )
          exec(compile(script, '<tcp-session-binding>', 'exec'), {'__name__': '__main__'})

          Path('.agent-apply-trigger').unlink(missing_ok=True)
          Path('agent-finalize-error.txt').unlink(missing_ok=True)
          subprocess.run(
              ['git', 'checkout', 'origin/main', '--', '.github/workflows/rust-quality.yml'],
              check=True,
          )
          PY

      - name: Format production code
        run: cargo fmt --all

      - name: Verify formatting
        run: cargo fmt --all -- --check

      - name: Run strict Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Verify isolated final diff
        run: |
          test ! -e .github/workflows/agent-apply-session-binding.yml
          test ! -e .agent-apply-trigger
          test ! -e agent-finalize-error.txt
          git diff --check
          changed="$(git diff --name-only origin/main)"
          test "$changed" = $'crates/reverse-tunnel/src/state.rs\ncrates/reverse-tunnel/src/tunnel.rs'

      - name: Commit validated production slice
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "bind TCP proxy streams to device sessions"
          git push origin HEAD:agent/tcp-session-bound-pending-streams
