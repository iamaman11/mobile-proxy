name: Rust Quality

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: rust-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-quality:
    name: Format, Clippy, Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source branch
        uses: actions/checkout@v7
        with:
          ref: agent/tunnel-observability
          fetch-depth: 0

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Apply control-plane observability hardening
        run: python3 .github/agent_observability_fix7.py

      - name: Format production code
        run: cargo fmt --all

      - name: Run strict Clippy
        id: clippy
        continue-on-error: true
        shell: bash
        run: |
          set +e
          cargo clippy --workspace --all-targets -- -D warnings > hardening-clippy-error.txt 2>&1
          status=$?
          cat hardening-clippy-error.txt
          exit "$status"

      - name: Persist exact hardening failure
        if: steps.clippy.outcome == 'failure'
        run: |
          git checkout HEAD -- .github/agent_observability_fix7.py .github/workflows/rust-quality.yml services/control-plane/src/projection.rs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "record observability normalization Clippy failure"
          git push origin HEAD:agent/tunnel-observability

      - name: Enforce strict Clippy
        if: steps.clippy.outcome == 'failure'
        run: exit 1
