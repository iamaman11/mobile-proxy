name: Rust Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: rust-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-quality:
    name: Format, Clippy, Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source branch
        uses: actions/checkout@v7
        with:
          ref: agent/session-heartbeat-freshness
          fetch-depth: 0

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Apply corrected heartbeat freshness slice
        run: python3 .github/agent_freshness_fix.py

      - name: Format production code
        run: cargo fmt --all

      - name: Verify formatting
        run: cargo fmt --all -- --check

      - name: Run strict Clippy
        id: clippy
        continue-on-error: true
        shell: bash
        run: |
          set +e
          cargo clippy --workspace --all-targets -- -D warnings > clippy-error.txt 2>&1
          status=$?
          cat clippy-error.txt
          exit "$status"

      - name: Persist exact Clippy failure
        if: steps.clippy.outcome == 'failure'
        run: |
          git checkout HEAD -- .github/agent_freshness.py .github/agent_freshness_fix.py .github/workflows/rust-quality.yml
          git checkout origin/main -- crates/reverse-tunnel/src/state.rs crates/reverse-tunnel/src/tunnel.rs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "record corrected heartbeat freshness failure"
          git push origin HEAD:agent/session-heartbeat-freshness

      - name: Enforce strict Clippy
        if: steps.clippy.outcome == 'failure'
        run: exit 1

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Verify isolated final diff
        run: |
          rm -f clippy-error.txt
          git diff --check
          changed="$(git diff --name-only origin/main)"
          test "$changed" = $'crates/reverse-tunnel/src/state.rs\ncrates/reverse-tunnel/src/tunnel.rs'

      - name: Commit validated production slice
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "enforce heartbeat freshness for tunnel sessions"
          git push origin HEAD:agent/session-heartbeat-freshness
