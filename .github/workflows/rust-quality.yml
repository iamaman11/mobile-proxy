name: Rust Quality

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: rust-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-quality:
    name: Format, Clippy, Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source branch
        uses: actions/checkout@v7
        with:
          ref: agent/operator-tunnel-observability
          fetch-depth: 0

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Apply operator tunnel observability slice
        run: python3 .github/agent_operator_observability.py

      - name: Format production code
        id: formatting
        continue-on-error: true
        shell: bash
        run: |
          set +e
          cargo fmt --all > operator-rustfmt-error.txt 2>&1
          status=$?
          cat operator-rustfmt-error.txt
          exit "$status"

      - name: Persist exact formatting failure
        if: steps.formatting.outcome == 'failure'
        run: |
          git checkout HEAD -- .github/agent_operator_observability.py .github/workflows/rust-quality.yml
          git checkout origin/main -- apps/operator-cli/src/cli.rs apps/operator-cli/src/commands.rs apps/operator-cli/src/http.rs apps/operator-cli/src/main.rs services/host-daemon/src/api.rs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "record operator observability formatting failure"
          git push origin HEAD:agent/operator-tunnel-observability

      - name: Enforce formatting
        if: steps.formatting.outcome == 'failure'
        run: exit 1
