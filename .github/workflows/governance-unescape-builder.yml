name: Governance Unicode Cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/device-registration-application-port' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/device-registration-application-port

      - name: Restore canonical Unicode JSON
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('contracts/governance/invariant-enforcement.json')
          document = json.loads(path.read_text(encoding='utf-8'))
          path.write_text(
              json.dumps(document, indent=2, ensure_ascii=False) + '\n',
              encoding='utf-8',
          )
          PY
          python3 scripts/check_architecture_boundaries.py
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'
          git diff --check

      - name: Publish clean source head
        run: |
          rm .github/workflows/governance-unescape-builder.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Preserve governance Unicode anchors"
          git push origin HEAD:agent/device-registration-application-port
