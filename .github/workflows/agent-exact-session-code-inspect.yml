name: Inspect Exact Session Compile Source

on:
  push:
    branches:
      - agent/exact-session-binding-builder

permissions:
  issues: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/exact-session-binding-builder
      - name: Decode transformation
        run: |
          cat \
            .agent/exact-session-binding.py.gz.b64.00 \
            .agent/exact-session-binding.py.gz.b64.01 \
            .agent/exact-session-binding.py.gz.b64.02 \
            .agent/exact-session-binding.py.gz.b64.03a \
            .agent/exact-session-binding.py.gz.b64.03b \
            .agent/exact-session-binding.py.gz.b64.03c \
            .agent/exact-session-binding.py.gz.b64.03d0 \
            .agent/exact-session-binding.py.gz.b64.03d1 \
            .agent/exact-session-binding.py.gz.b64.03d2 \
            .agent/exact-session-binding.py.gz.b64.03d3 \
            .agent/exact-session-binding.py.gz.b64.04 \
            | tr -d '\n' | base64 --decode | gzip --decompress --stdout > /tmp/exact-session-binding.py
          python3 .agent/repair-exact-session-transform.py /tmp/exact-session-binding.py
      - name: Apply transformation to production baseline
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags origin main
          git checkout -B inspect-exact-session origin/main
          python3 /tmp/exact-session-binding.py
          cargo fmt --all
      - name: Publish bounded source context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo 'Transformed source around Clippy dead-code diagnostics:'
            echo
            echo '### state.rs 200-265'
            echo '```rust'
            sed -n '200,265p' crates/reverse-tunnel/src/state.rs
            echo '```'
            echo
            echo '### state.rs 590-650'
            echo '```rust'
            sed -n '590,650p' crates/reverse-tunnel/src/state.rs
            echo '```'
            echo
            echo '### references'
            echo '```text'
            grep -R -n -E 'register_tcp_control|remove_tcp_control_for_session|cancel_pending_for_session' crates/reverse-tunnel/src || true
            echo '```'
          } > /tmp/context.md
          gh issue edit 53 --repo "$GITHUB_REPOSITORY" --body-file /tmp/context.md
